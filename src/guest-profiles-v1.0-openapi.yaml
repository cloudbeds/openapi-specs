                    firstName: "Jane"
                    lastName: "Doe"
                    email: "jane.doe@example.com"
                    phone: null
                    isUnmergeEligible: false
                    mergedAt: "2024-08-15T10:30:00+00:00"
        404:
          $ref: '#/components/responses/ProfileNotFound'
  /merges:
    get:
      tags:
        - Merges
      summary: Returns a list of guest profile merges
      responses:
        200:
          description: 'Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMergesResponse'
