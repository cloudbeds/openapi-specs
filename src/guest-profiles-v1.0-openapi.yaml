openapi: 3.1.0
info:
  title: 'Guest Profile API'
  description: |
    #### The Cloudbeds Guest Profiles API provides programmatic methods to access guest profile data. With the Cloudbeds Guest Profile API, you can:
    - Get a list of guest profiles
    - Get a list of merge/unmerge operations for profiles

    [Terms of service](https://www.cloudbeds.com/terms/api/)\
    [Contact the developer](mailto:support@cloudbeds.com)\
    [Cloudbeds](https://www.cloudbeds.com)\
    *Note: The API returns application/json*
  version: "v1"
servers:
  -
    url: '/guest-profiles/v1'
paths:
  /profiles:
    get:
      tags:
        - Profiles
      summary: Returns a list of guest profiles
      security:
        - superAdmin: [ ]
        - partner:
            - 'read:guest'
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/IncludeTotal'
        - $ref: '#/components/parameters/Filters'
          x-extend-description: |
            **Allowed fields**: `dateModified` (`greater_than_or_equal`, `greater_than`, `less_than_or_equal`, `less_than`),
            `parentId` (`equals`, `not_equals`, `is_null`, `is_not_null`),
            `checkinAt` (`greater_than_or_equal`, `greater_than`, `less_than_or_equal`, `less_than`),
            `checkoutAt` (`greater_than_or_equal`, `greater_than`, `less_than_or_equal`, `less_than`),
            `country` (`equals`, `not_equals`, `in`, `not_in`),
            `status` (`equals`, `not_equals`, `in`, `not_in`),
            `isRepeatGuest` (`equals`, `not_equals`, `in`, `not_in`).
          x-example: 'dateModified:greater_than_or_equal:2024-07-17T14:00:00-08:00'
        - $ref: '#/components/parameters/Sort'
          x-extend-description: |
            **Allowed fields**: `firstName`, `lastName`, `email`, `phone`, `country`, `isRepeatGuest`, `dateModified`.
          x-example: 'email:asc'
      responses:
        200:
          description: 'Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilesResponse'
              example:
                - offset: 40
                  limit: 20
                  total: 80
                  data:
                    - id: "123456788"
                      organizationId: "12345"
                      photoId: 12345
                      taxId: "*****"
                      companyTaxId: "*****"
                      statusId: 12345
                      statusName: "StatusName"
                      firstName: "First Name 1"
                      lastName: "Last Name 1"
                      email: "test1@example.com"
                      phone: "123456789"
                      cellPhone: "123456789"
                      birthday: "1970-01-01"
                      gender: "M/F"
                      companyName: "*****"
                      address1: "Address line 1"
                      address2: "Address line 2"
                      city: "City"
                      country: "AZ"
                      countryName: "Azerbaijan"
                      state: "State"
                      zip: "12345"
                      documentType: "driver_licence"
                      documentNumber: "*****"
                      documentIssueDate: "1970-01-01"
                      documentIssuingCountry: "US"
                      documentExpirationDate: "1970-01-01"
                      isOptIn: false
                      isMerged: false
                      isRepeatGuest: false
                    - id: "123456789"
                      organizationId: "12345"
                      photoId: 12345
                      taxId: "*****"
                      companyTaxId: "*****"
                      statusId: 12345
                      statusName: "StatusName"
                      firstName: "First Name 2"
                      lastName: "Last Name 2"
                      email: "test2@example.com"
                      phone: "123456789"
                      cellPhone: "123456789"
                      birthday: "1970-01-01"
                      gender: "M/F"
                      companyName: "*****"
                      address1: "Address line 1"
                      address2: "Address line 2"
                      city: "City"
                      country: "FR"
                      countryName: "France"
                      state: "State"
                      zip: "12345"
                      documentType: "driver_licence"
                      documentNumber: "*****"
                      documentIssueDate: "1970-01-01"
                      documentIssuingCountry: "PT"
                      documentExpirationDate: "1970-01-01"
                      isOptIn: false
                      isMerged: false
                      isRepeatGuest: false
    post:
      tags:
        - Profiles
      summary: Create a new profile
      security:
        - superAdmin: [ ]
        - partner:
            - 'write:guest'
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Profile'
      responses:
        200:
          description: 'Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
  /profiles/{profileId}:
    get:
      tags:
        - Profiles
      summary: Returns a single profile by ID
      security:
        - superAdmin: [ ]
        - partner:
            - 'read:guest'
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/ProfileId'
      responses:
        200:
          description: 'Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
              example:
                id: "123456788"
                organizationId: "12345"
                photoId: 12345
                taxId: "*****"
                companyTaxId: "*****"
                statusId: 12345
                statusName: "StatusName"
                firstName: "First Name 1"
                lastName: "Last Name 1"
                email: "test1@example.com"
                phone: "123456789"
                cellPhone: "123456789"
                birthday: "1970-01-01"
                gender: "M/F"
                companyName: "*****"
                address1: "Address line 1"
                address2: "Address line 2"
                city: "City"
                country: "UA"
                countryName: "Ukraine"
                state: "State"
                zip: "12345"
                documentType: "driver_licence"
                documentNumber: "*****"
                documentIssueDate: "1970-01-01"
                documentIssuingCountry: "CA"
                documentExpirationDate: "1970-01-01"
                isOptIn: false
                isMerged: false
                isRepeatGuest: false
                dateCreated: "2024-08-06T13:38:35+00:00"
                dateModified: "2024-08-06T16:58:59+00:00"
                photo:
                  fileId: 12345
                  path: "https://amazonaws.com/photo-jumbo~~67816f854de79.jpg"
                  croppedImage: "https://amazonaws.com/photo-jumbo_thumb~~67816f857ccab.jpg"
                  height: 797
                  width: 1000
                  cropParam:
                    width: 75.140625
                    height: 75.140625
                    x: 212.12890625
                    y: 210.203125
        404:
          $ref: "#/components/responses/ProfileNotFound"
    patch:
      tags:
        - Profiles
      summary: Update a profile
      security:
        - superAdmin: [ ]
        - partner:
            - 'write:guest'
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/ProfileId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Profile'
      responses:
        200:
          description: 'Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
  /profiles/{profileId}/pii-field:
    get:
      tags:
        - Profiles
      summary: Returns a value of PII field for a given profile
      security:
        - superAdmin: [ ]
        - partner:
            - 'read:guest'
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/ProfileId'
        - name: fieldName
          description: 'PII field name'
          in: query
          required: true
          schema:
            type: string
            example: 'companyTaxId'
        - name: isCustomField
          description: 'Is custom field'
          in: query
          required: false
          schema:
            type: boolean
            example: true
      responses:
        200:
          description: 'Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProfilePiiFieldResponse'
              example:
                - value: "12345"
        404:
          $ref: "#/components/responses/ProfileNotFound"
  /profiles/{profileId}/stats:
    get:
      tags:
        - Profiles
      summary: Returns the stats of a given profile.
      responses:
        200:
          description: 'Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileStatistics'
              example:
                - profileId: "profile-id-1"
                  propertyId: "a-property-id"
                  reservations: 1
                  nights: 2
                  revenue: 398.00
                  sources: "2;1;dashboard;2024-08-27"
                  lastVisit: "2024-08-27"
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/ProfileId'
        - $ref: '#/components/parameters/Filters'
          x-extend-description: |
            **Allowed fields**: `propertyId` (`equals`, `in`).
          x-example: 'propertyId:124 or propertyId:in:123,124'
      security:
        - superAdmin: [ ]
        - partner:
            - 'read:guest'
  /profiles/filters:
    get:
      tags:
        - Profiles
      summary: Returns available filter values for guest profiles
      description: |
        Returns the list of countries and guest statuses that can be used as filter values
        when querying guest profiles. Both countries and statuses are sourced from the
        guest-profile service.
      security:
        - superAdmin: [ ]
        - partner:
            - 'read:guest'
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        200:
          description: 'Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileFiltersResponse'
              example:
                countries:
                  - code: "US"
                    name: "United States"
                  - code: "CA"
                    name: "Canada"
                guestStatuses:
                  - id: 1
                    name: "VIP"
                  - id: 2
                    name: "Returning"
        404:
          description: API not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
              example:
                code: "404"
                message: "API is not enabled for this organization."
        5XX:
          description: An error occurred interacting with the API.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
  /profiles/{profileId}/sources:
    get:
      tags:
        - Profiles
      summary: Returns the sources of a given profile.
      responses:
        200:
          description: 'Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileSourcesResponse'
              example:
                data:
                  - name: "Email"
                    date: "2024-10-24"
                  - name: "Walk-In"
                    date: "2025-06-25"
        5XX:
          description: An error occurred interacting with the API.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/ProfileId'
      security:
        - superAdmin: [ ]
        - partner:
            - 'read:guest'
  /profiles/{profileId}/anonymize:
    post:
      tags:
        - Profiles
      summary: Anonymize a given profile.
      responses:
        200:
          description: 'Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
              example:
                id: "74003650641856"
                organizationId: "3"
                photoId: "0"
                taxId: "*****"
                companyTaxId: "*****"
                statusId: "0"
                statusName: "N/A"
                firstName: "Anonymized"
                lastName: "Anonymized"
                email: "anonymized-4cc7529392@example.com"
                phone: ""
                cellPhone: ""
                birthday: null
                gender: "N/A"
                companyName: "*****"
                address1: ""
                address2: ""
                city: "Riyadh"
                country: "SA"
                countryName: "Saudi Arabia"
                state: "Jizan"
                zip: "69663"
                documentType: "student_id"
                documentNumber: "*****"
                documentIssueDate: null
                documentExpirationDate: null
                documentIssuingCountry: null
                isOptIn: false
                isMerged: false
                isRepeatGuest: false
                dateCreated: "2025-02-25T20:30:07+00:00"
                dateModified: "2025-02-25T19:17:51+00:00"
                dateAnonymized: "2025-02-25T19:17:51+00:00"
                parentId: null
        400:
          description: Anonymization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
                example:
                  code: "400"
                  message: "Anonymization failed"
        403:
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
                example:
                  code: "403"
                  message: "You do not have permission to anonymize guests"
        404:
          $ref: "#/components/responses/ProfileNotFound"
        405:
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
                example:
                  code: "405"
                  message: "Anonymization is not enabled for this organization"
        409:
          description: Anonymization is not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
                example:
                  code: "409"
                  message: "Anonymization is not available"
        422:
          description: Profile is already anonymized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
                example:
                  code: "422"
                  message: "Profile is already anonymized"
        428:
          description: GDPR is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
                example:
                  code: "428"
                  message: "GDPR is not enabled for all properties of organization"
        5XX:
          description: An error occurred interacting with the API.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/ProfileId'
      security:
        - superAdmin: [ ]
        - partner:
            - 'write:guest'
  /merges/suggested:
    get:
      tags:
        - Merges
      summary: Get a list of suggested merges.
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/Filters'
          x-extend-description: |
            **Allowed fields**: `profileId`.
          x-example: 'profileId:112 or profileId:in:12,123,1234'
      responses:
        200:
          description: List of suggested merges.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMergeSuggestionsResponse'
              example:
                - data:
                    - suggestions:
                        - id: 1234
                          createdAt: "2024-07-22 07:40:46"
                        - suggestionProfile:
                            - id: 567
                              suggestionId: 1234
                              profileId: 9843
                - nextPageToken: "f029=3f-23f09"
      security:
        - superAdmin: []
        - partner:
            - 'read:guest'
  /profiles/{profileId}/custom-fields:
    get:
      summary: 'Get custom fields for a profile'
      operationId: getCustomFields
      tags:
        - Profiles
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/ProfileId'
      security:
        - superAdmin: [ ]
        - partner:
            - 'read:guest'
      responses:
        200:
          description: 'Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProfileCustomFieldsResponse'
              example:
                - data:
                    - id: 1
                      customFieldId: 2
                      name: "test-name"
                      value: "test-value"
                      label: "test-label"
                      type: "test-type"
                      isPersonal: 1
                      order: 0
                      maxLen: 25
                      required: 1
                    - id: 2
                      customFieldId: 3
                      name: "test-name 2"
                      value: "test-value 2"
                      label: "test-label 2"
                      type: "test-type 2"
                      isPersonal: 0
                      order: 1
                      maxLen: 50
                      required: 0
  /profiles/{profileId}/reservations:
    get:
      tags:
        - Reservations
      summary: Returns a list of reservations for a given profile
      security:
        - superAdmin: [ ]
        - partner:
            - 'read:guest'
            - 'read:reservation'
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/ProfileId'
        - $ref: '#/components/parameters/Filters'
          x-extend-description: |
            **Allowed fields**: `checkinAt`, `checkoutAt`, `propertyId`, `roomId`, `roomTotal`, `roomTypeId`, `sourceCode`, `sourceId`, `status`.
          x-example: "name:equals:JohnDoe;age:greater_than:30;status:is_null"
        - $ref: '#/components/parameters/Sort'
          x-extend-description: |
            **Allowed fields**: `checkinAt`, `checkoutAt`, `propertyId`, `roomId`, `roomTotal`, `roomTypeId`, `sourceCode`, `sourceId`, `status`.
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/IncludeTotal'
      responses:
        200:
          description: 'Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProfileReservationsResponse'
  /profiles/{profileId}/merged-profiles:
    get:
      tags:
        - Profiles
      summary: Returns a list of profiles currently merged into a given profile
      security:
        - superAdmin: [ ]
        - partner:
            - 'read:guest'
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/ProfileId'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/IncludeTotal'
      responses:
        200:
          description: 'Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MergedProfileListResponse'
              example:
                offset: 0
                limit: 100
                total: 2
                data:
                  - profileId: "123456788"
                    mergeId: "8723618905976902"
                    firstName: "John"
                    lastName: "Doe"
                    email: "john.doe@example.com"
                    phone: "123456789"
                    isUnmergeEligible: true
                    mergedAt: "2024-07-22T07:40:46+00:00"
