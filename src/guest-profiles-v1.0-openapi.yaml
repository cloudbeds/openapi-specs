components:
  securitySchemes:
    superAdmin:
      type: http
      scheme: bearer
      bearerFormat: JWT
    partner:
      type: oauth2
      description: This API also supports partner based requests via OAuth2 tokens
      flows:
        authorizationCode:
          authorizationUrl: /oauth/authorize
          tokenUrl: /oauth/token
          scopes:
            "read:guest": read guests
            "write:guest": write guests

  parameters:
    OrganizationId:
      name: X-Organization-Id
      description: 'Organization ID'
      in: header
      required: true
      schema:
        type: string
        example: 10984769494708236
    ProfileId:
      name: profileId
      description: 'Profile ID'
      in: path
      required: true
      schema:
        type: number
        example: 226973
    Offset:
      name: offset
      description: 'The number of items to skip before starting to collect the result set.'
      in: query
      required: false
      schema:
        type: number
        minimum: 0
        multipleOf: 1
        default: 0
        example: 0
    Limit:
      name: limit
      description: 'The maximum number of items to return in the response.'
      in: query
      required: false
      schema:
        type: number
        minimum: 1
        maximum: 250
        multipleOf: 1
        default: 100
        example: 100
    IncludeTotal:
      name: includeTotal
      description: 'Use `true` to get `total` in the response'
      in: query
      required: false
      schema:
        type: boolean
        example: true
    Filters:
      name: filter
      description: |
        Filter criteria in the format `field:operation:value;field:operation:value`.
        - `field`: The field name to filter on.
        - `operation`: The operation to apply (e.g., equals, not_equals, greater_than, less_than).
        - `value`: The value to filter by. Value is not required for some operations, like is_null.
        Multiple filters can be separated by semicolons (`;`).
      in: query
      required: false
      schema:
        type: string
    Sort:
      name: sort
      description: |
        Sorting criteria in one of the following formats:
        1. `field1:asc,field2:desc` - Sorts by `field1` in ascending order and `field2` in descending order.
        2. `field1,field2` - Sorts by `field1` and `field2` in ascending order.
        3. Combination of both formats is allowed.
        Each field can be specified with `asc` (ascending) or `desc` (descending) if ordering is needed.
      in: query
      required: false
      schema:
        type: string
        example: "name:asc,age"
    MergeId:
      name: mergeId
      description: 'Numeric ID of the merge'
      in: path
      required: true
      schema:
        type: integer
        format: int64
        example: 123456

  schemas:
    APIError:
      type: object
      properties:
        code:
          type: string
          example: '500'
        message:
          type: string
          example: "Bad Request"
        errors:
          type: array
          items:
            type: string
          example: []
    ProfileResponse:
      allOf:
        - $ref: '#/components/schemas/Profile'
        - type: object
          properties:
            id:
              description: "Profile's unique identifier"
              type: string
              example: "123456788"
            organizationId:
              description: "Organization ID"
              type: string
              example: "12345"
            statusName:
              description: "Profile Status Name. Deprecated: Use statuses instead."
              type: string
              example: "VIP"
              deprecated: true
            statuses:
              description: "All statuses for this profile across all properties"
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    description: "Status ID"
                    example: 1
                  name:
                    type: string
                    description: "Status name"
                    example: "VIP"
              example: [{"id": 1, "name": "VIP"}, {"id": 2, "name": "Regular"}]
            isMerged:
              description: "Merged status. Merged profiles are no longer active in the Cloudbeds system"
              type: boolean
              example: false
            isRepeatGuest:
              description: "Repeat-guest status"
              type: boolean
              example: false
            dateCreated:
              description: "Creation date. Date/Time string based on RFC 3339 (Y-m-dTH:i:sP)"
              type: string
              format: date-time
              example: "2024-08-06T13:38:35+00:00"
            dateModified:
              description: "Modification date. Date/Time string based on RFC 3339 (Y-m-dTH:i:sP)"
              type: string
              format: date-time
              example: "2024-08-06T16:58:59+00:00"
            dateAnonymized:
              description: "Anonymization date. Date/Time string based on RFC 3339 (Y-m-dTH:i:sP)"
              type: string
              format: date-time
              example: "2024-08-06T16:58:59+00:00"
            parentId:
              description: "Profile's parent unique identifier"
              type: string
              example: "123456789"
            photo:
              $ref: '#/components/schemas/ProfilePhoto'
            isAnonymizationAvailable:
              description: "Anonymization availability status"
              type: boolean
              example: true
    Profile:
      type: object
      properties:
        photoId:
          description: "Photo ID"
          type: number
          example: 12345
        taxId:
          description: "Tax ID"
          type: string
          example: "12345"
        companyTaxId:
          description: "Company tax ID"
          type: string
          example: "12345"
        statusId:
          description: "Profile Status ID. Deprecated: Use statuses instead."
          type: number
          example: 12
          deprecated: true
        firstName:
          description: "First name"
          type: string
          example: "John"
        lastName:
          description: "Last name"
          type: string
          example: "Doe"
        email:
          description: "Email address"
          type: string
          example: "john.doe@example.com"
        phone:
          description: "Phone number"
          type: string
          example: "123456789"
        cellPhone:
          description: "Cellphone number"
          type: string
          example: "123456789"
        birthday:
          description: "Birthday"
          type: string
          format: date
          example: "1970-01-01"
        gender:
          description: "Gender"
          type: string
          example: "M"
        companyName:
          description: "Company name"
          type: string
          example: "Company"
        address1:
          description: "Address line 1"
          type: string
          example: "Address line 1"
        address2:
          description: "Address line 2"
          type: string
          example: "Address line 2"
        city:
          description: "City"
          type: string
          example: "City"
        country:
          description: "Two digit Country Code. ISO 3166-1 alpha-2"
          type: string
          example: "US"
        countryName:
          description: "Country name"
          type: string
          example: "United States"
        state:
          description: "State"
          type: string
          example: "State"
        zip:
          description: "ZIP code"
          type: string
          example: "12345"
        documentType:
          description: "Document type"
          type: string
          example: "driver_licence"
        documentNumber:
          description: "Document number"
          type: string
          example: "123456789"
        documentIssueDate:
          description: "Document issue date"
          type: string
          format: date
          example: "1970-01-01"
        documentIssuingCountry:
          description: 'Document issue country. ISO 3166-1 alpha-2'
          type: string
          example: "US"
        documentExpirationDate:
          description: "Document expiration date"
          type: string
          format: date
          example: "1970-01-01"
        isOptIn:
          description: "Opt-in status"
          type: boolean
          example: false
    ProfilePhoto:
      type: object
      properties:
        fileId:
          description: "Photo unique identifier"
          type: string
          example: "12345"
        path:
          description: "Photo URL"
          type: string
          example: "https://amazonaws.com/photo-jumbo~~67816f854de79.jpg"
        croppedImage:
          description: "Cropped photo URL"
          type: string
          example: "https://amazonaws.com/photo-jumbo_thumb~~67816f857ccab.jpg"
        height:
          description: "Photo height"
          type: integer
          example: 797
        width:
          description: "Photo width"
          type: integer
          example: 1000
        cropParam:
          description: "Crop parameters"
          type: object
          properties:
            width:
              description: "Cropped photo width"
              type: number
              example: 75.140625
            height:
              description: "Cropped photo height"
              type: number
              example: 75.140625
            x:
              description: "X coordinate of the top-left corner of the cropped photo"
              type: number
              example: 212.12890625
            y:
              description: "Y coordinate of the top-left corner of the cropped photo"
              type: number
              example: 210.203125
    ListMergeSuggestionsResponse:
      type: object
      properties:
        suggestions:
          description: 'List of suggestions found.'
          type: array
          items:
            $ref: '#/components/schemas/Suggestion'
        nextPageToken:
          type: string
          description: "If there are more responses, the token to fetch the next in the list."
    ProfileMerge:
      type: object
      properties:
        id:
          description: "Merge unique identifier"
          type: string
        mergeAt:
          description: "Merge date"
          type: string
          format: date
        eventType:
          description: "Event type"
          type: string
          enum: [ "merge", "unmerge" ]
        beforeMergeProfiles:
          type: array
          description: >
            For merges, the `before` property will contain the full list of profiles involved in the merge.
            For unmerges, the `before` property will contain the profile to unlink from a prior merge.
          items:
            $ref: '#/components/schemas/ProfileResponse'
        afterMergeProfiles:
          type: array
          description: >
            The `after` property will contain the single new profile after merge.
            The `after` property will contain the list of profiles after the unmerge operation is complete.
          items:
            $ref: '#/components/schemas/ProfileResponse'
    ProfileStatistics:
      type: object
      properties:
        profileId:
          description: The guests ID.
          type: string
        propertyId:
          description: The property ID that this statistic pertains to.
          type: string
        reservations:
          description: Number of reservations at this property.
          type: integer
        nights:
          description: The number of nights at this property.
          type: integer
        revenue:
          description: Revenue this profile has generated.
          type: number
          format: float
        lastVisit:
          description: RFC3399 date of the last time the profile visited the property (check-in date)
          type: string
          format: date
    ProfileSourcesResponse:
      type: object
      properties:
        data:
          description: List of profile sources
          type: array
          items:
            $ref: '#/components/schemas/ProfileSource'
    ProfileSource:
      type: object
      properties:
        name:
          description: Source name
          type: string
        date:
