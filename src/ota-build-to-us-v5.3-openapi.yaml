        content:
          application/json:
            examples:
              UpdateProperty:
                summary: UpdateProperty
                value:
                  verb: UpdateProperty
                  ota_property_id: lake_view_hotel
                  ota_property_password: very-secret-password
                  ota_property_sub_id: '10034818'
                  mya_property_id: 25678
                  guid: 6C08B96E-450D-4E6A-9933-7D0305730305
                  shared_secret: s3cr3ts4uc3
                  ota_cid: ota
                  Property:
                    name: Sample Hostel
                    country: US
                    currency: EUR
                    email_default: someone@example.com
                    email_channel_booking: bookings@example.com
                    email_contact: person@example.com
                    default_min_los: 3
                    default_max_los: 0
                    breakfast: ''
                    weekend:
                      - tuesday
                      - saturday
                      - sunday
                    firstname: John
                    lastname: Smith
                    timezone: Asia/Thimphu
                    address:
                      address_line_1: Main St
                      address_line_2: Annex
                      city: San Diego
                      zip: '92120'
                      state: CA
                      country: US
                      website: http://example.com
                      lon: '32.715736'
                      lat: '-117.161087'
                      phone: '+1 123123123 '
                      fax: +1 123123123
                    business_contact:
                      main_contact_name: Jeff Johnson
                      company_name: Hostels Inc.
                      account_manager_name: Hillary Jackson
                      vat_id: US2345678
                      address_line_1: Office Street
                      address_line_2: 3rd floor
                      state: Office State
                      zip: '22222'
                      city: Office City
                      country: DE
            schema:
              allOf:
                - $ref: '#/components/schemas/auth'
                - type: object
                  properties:
                    mya_property_id:
                      description: Property ID on the Cloudbeds channel manager
                      type: integer
                      minimum: 1
                    guid:
                      description: Request reference ID, used for debugging and support requests.
                      type: string
                      pattern: ^[0-9a-fA-F]{8}-([0-9a-fA-F]{4}-){3}[0-9a-fA-F]{12}$
                    shared_secret:
                      description: Authentication between the OTA and the channel. Identical for all requests. Not to be shared with customers.
                      type: string
                    ota_cid:
                      description: OTA ID as given by Cloudbeds
                      type: string
                      pattern: ^[a-z0-9]+$
                    verb:
                      type: string
                      enum:
                        - UpdateProperty
                    Property:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Property name
                        country:
                          type: string
                          pattern: ^[A-Z]{2}$
                          description: |
                            2-letter ISO 3166-1 alpha-2 country code. This is the country the property is located in.
                        currency:
                          type: string
                          pattern: ^[A-Z]{3}$
                          description: |
                            3-letter ISO 4217 currency code. This is the default currency of the property.
                        timezone:
                          type: string
                          description: |
                            Timezone the property is located in. Check (this document)[https://apidocs.myallocator.com/timezone-list.html] for valid values.
                        email_default:
                          type: string
                          format: email
                          description: |
                            The default property email address. Defaults to default user email.
                        email_channel_booking:
                          type: string
                          format: email
                          description: |
                            The email address used when forwarding channel booking emails. Defaults to default user email.
                        email_contact:
                          type: string
                          format: email
                          description: |
                            The email address of the contact person responsible for the property creation.
                        default_min_los:
                          type: integer
                          minimum: 1
                          description: |
                            Default minimum length of stay setting for this property. See the description for `min_los` in the `ARIUpdate` call for more details on this restriction.
                        default_max_los:
                          type: integer
                          minimum: 0
                          description: |-
                            Default maximum length of stay setting for this property.
                            See the description for `max_los` in the `ARIUpdate` call
                            for more details on this restriction.

                            `0` means there is no restriction.
                        breakfast:
                          type: string
                          enum:
                            - ''
                            - IN
                            - EX
                          description: |-
                            Default breakfast setting for the property. Empty string
                            means no breakfast is available, `IN` means breakfast is
                            included in the day rates and `EX` means breakfast is
                            excluded from day rates.

                            Note that this setting is likely not very useful and too
                            broad.
                        weekend:
                          type: array
                          items:
                            type: string
                            enum:
                              - monday
                              - tuesday
                              - wednesday
                              - thursday
                              - friday
                              - saturday
                              - sunday
                          description: |-
                            List of weekdays that the property considers to be their
                            weekend.

                            Note that this setting is likely not very useful.
                        firstname:
                          type: string
                          description: |
                            First name of property owner/manager.
                        lastname:
                          type: string
                          description: |
                            First name of property owner/manager.
                        address:
                          type: object
                          description: Address of the property.
                          properties:
                            address_line_1:
                              type:
                                - string
                                - 'null'
                              description: First address line of the property (usually the street name and house number)
                            address_line_2:
                              type:
                                - string
                                - 'null'
                              description: Second address line of the property (if applicable)
                            city:
                              type:
                                - string
                                - 'null'
                              description: City or locality the property is located in
                            zip:
                              type:
                                - string
                                - 'null'
                              description: Post Code (ZIP) of the property
                            state:
                              type:
                                - string
                                - 'null'
                              description: State of the property (if applicable)
                            country:
                              type: string
                              pattern: ^[A-Z]{2}$
                              description: |
                                2-letter ISO 3166-1 alpha-2 country code. This is the country the property is located in. Same as `country` on the top level.
                            website:
                              type:
                                - string
                                - 'null'
                              description: Homepage of the property
                            lon:
                              type:
                                - string
                                - 'null'
                              description: |
                                Geographic longitude of the property, given as decimal degrees. Positive for east, negative for west. Example: `-117.15292`
                            lat:
                              type:
                                - string
                                - 'null'
                              description: |
                                Geographic latitude of the property, given as decimal degrees. Positive for north, negative for south. Example: `32.70954`
                            phone:
                              type:
                                - string
                                - 'null'
                              description: |
                                Phone number for the property with international country code (eg. `+44 350 5697864`)
                            fax:
                              type:
                                - string
                                - 'null'
                              description: |
                                Fax number for the property with international country code (eg. `+44 350 5697864`)
                          required:
                            - country
                        business_contact:
                          type: object
                          description: Contact information for invoicing
                          properties:
                            main_contact_name:
                              type:
                                - string
                                - 'null'
                              description: Name of the main contact for the property
                            company_name:
                              type:
                                - string
                                - 'null'
                              description: Name of the company owning the property
                            account_manager_name:
                              type:
                                - string
                                - 'null'
                              description: Name of the account manager responsible for the property
                            vat_id:
                              type:
                                - string
                                - 'null'
                              description: Tax ID for the property
                            address_line_1:
                              type:
                                - string
                                - 'null'
                              description: First address line of the company or property owner (usually the street name and house number)
                            address_line_2:
                              type:
                                - string
                                - 'null'
                              description: Second address line of the company or property owner (if applicable)
                            state:
                              type:
                                - string
                                - 'null'
                              description: State of the company or property owner (if applicable)
                            zip:
                              type:
                                - string
                                - 'null'
                              description: Post Code (ZIP) of the company or property owner
                            city:
                              type:
                                - string
                                - 'null'
                              description: City or locality the company or property owner is located in
                            country:
                              type: string
                              pattern: ^[A-Z]{2}$
                              description: |
                                2-letter ISO 3166-1 alpha-2 country code. This is the country the the company or property owner is located in.
                          required:
                            - country
              required:
                - guid
                - mya_property_id
                - shared_secret
                - ota_cid
                - verb
                - Property
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                Success:
                  summary: Success
                  value:
                    success: true
                Failure:
                  summary: Invalid credentials
                  value:
                    success: false
                    errors:
                      - id: 1001
                        msg: The login details you provided are incorrect
              schema:
                oneOf:
                  - type: object
                    title: Success
                    properties:
                      success:
                        type: boolean
                        enum:
                          - true
                    required:
                      - success
                  - $ref: '#/components/schemas/response_error'
          description: UpdateProperty
      summary: UpdateProperty
      tags:
        - Content
  /GetSubProperties:
    post:
      operationId: get_sub_properties
      description: |-
        Some OTAs only tie one property to a specific login username/password where
        the username is also the ota_property_id. Others allow for one
        username/password to be associated with multiple properties. In this second
        case, each OTA property identifier is stored as an `ota_property_sub_id` in
        order to be handled separately from the property's OTA username. This method
        call should return all of the properties (ota_property_sub_ids) associated
        with the OTA's username/password so that the correct `ota_property_sub_id`
        can be linked with our `mya_property_id` for a specific property.

        *IMPORTANT*: Please contact us to enable this feature for your OTA. It is
        NOT enabled by default. It is only necessary if your OTA allows for
        multiple properties associated with one login username/password.

        Implementation suggestions: `ota_property_sub_id` will be the OTA identifier
        for a specific property managed by the hotel while the title is that
        property's name. This method will allow the property to map their
        Cloudbeds property with the OTA's `ota_property_sub_id` when setting up
        the property-OTA association on Cloudbeds.
      requestBody:
        content:
          application/json:
            examples:
              GetSubProperties:
                summary: GetSubProperties
                value:
                  verb: GetSubProperties
                  ota_property_id: lake_view_hotel
                  ota_property_password: very-secret-password
                  ota_property_sub_id: ''
                  mya_property_id: 25678
                  guid: 6C08B96E-450D-4E6A-9933-7D0305730305
                  ota_cid: ota
                  shared_secret: s3cr3ts4uc3
            schema:
              type: object
              properties:
                mya_property_id:
                  description: Property ID on the Cloudbeds channel manager
                  type: integer
                  minimum: 1
                ota_property_id:
                  description: Username, login or property ID on the OTA
                  type: string
                ota_property_password:
                  description: Password for property on your OTA. In case the OTA does not use passwords this will be an empty string.
                  type: string
                ota_property_sub_id:
                  type: string
                  description: Always an empty string for this call
                  enum:
                    - ''
                guid:
                  description: Request reference ID, used for debugging and support requests.
                  type: string
                  pattern: ^[0-9a-fA-F]{8}-([0-9a-fA-F]{4}-){3}[0-9a-fA-F]{12}$
                shared_secret:
                  description: Authentication between the OTA and the channel. Identical for all requests. Not to be shared with customers.
                  type: string
                ota_cid:
                  description: OTA ID as given by Cloudbeds
                  type: string
                  pattern: ^[a-z0-9]+$
                verb:
                  type: string
                  enum:
                    - GetSubProperties
              required:
                - verb
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                Success:
                  summary: Success
                  value:
                    success: true
                    SubProperties:
                      - ota_property_sub_id: '10034812'
                        title: Sea-side Beach Hotel
                      - ota_property_sub_id: '10034818'
                        title: Lakeview Apartments
                Failure:
                  summary: Invalid credentials sent
                  value:
                    success: false
                    errors:
                      - id: 1001
                        msg: The login details you provided are incorrect.
              schema:
                oneOf:
                  - type: object
                    title: Successful property list retrieval
                    properties:
                      success:
                        type: boolean
                        enum:
                          - true
                      SubProperties:
                        type: array
                        description: |
                          List of properties for the user on the OTA.
                        items:
                          type: object
                          properties:
                            ota_property_sub_id:
                              type: string
                              description: |
                                Property ID on the OTA.
                            title:
                              type: string
                              description: Name of the property
                          required:
                            - ota_property_sub_id
                            - title
                    required:
                      - success
                      - SubProperties
                  - $ref: '#/components/schemas/response_error'
          description: GetSubProperties
      summary: GetSubProperties
      tags:
        - Connection
