  /AckBooking:
    post:
      operationId: ack_booking
      description: |-
        Allows Cloudbeds to acknowledge a booking on your OTA from the Cloudbeds side.

        *IMPORTANT*: Please contact us to enable this capability for your channel. It
        is NOT enabled by default.

        If the booking cannot be acknowledged the error code should be provided. Here
        are possible error codes:

        * 4004 - booking cannot be acknowledged. The reason is provided in the `msg` field.
      requestBody:
        content:
          application/json:
            examples:
              AckBooking:
                summary: AckBooking
                value:
                  verb: AckBooking
                  ota_property_id: lake_view_hotel
                  ota_property_password: very-secret-password
                  ota_property_sub_id: '10034818'
                  mya_property_id: 25678
                  guid: 6C08B96E-450D-4E6A-9933-7D0305730305
                  ota_cid: ota
                  shared_secret: s3cr3ts4uc3
                  booking_id: H7736-29385551
            schema:
              allOf:
                - $ref: '#/components/schemas/auth'
                - type: object
                  properties:
                    verb:
                      type: string
                      enum:
                        - AckBooking
                    booking_id:
                      type: string
                      description: |
                        OTA booking ID of the booking to be acknowledged.
              required:
                - verb
                - booking_id
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                Failure:
                  summary: Booking has already been acknowledged
                  value:
                    success: false
                    errors:
                      - id: 4001
                        msg: Booking has already been acknowledged
                Success:
                  summary: Success
                  value:
                    success: true
              schema:
                $ref: '#/components/schemas/response_simple'
          description: AckBooking
      summary: AckBooking
      tags:
        - Bookings
  /CancelBooking:
    post:
      operationId: cancel_booking
      description: |-
        Allows a property to cancel a booking on your OTA from the Cloudbeds side.

        *IMPORTANT*: Please contact us to enable this capability for your channel. It
        is NOT enabled by default.

        The reason why the booking is to be canceled is given in the reason field.
        If the booking cannot be canceled the error code should be provided. Here
        are possible error codes:

        * 4001 - booking has already departed
        * 4002 - booking is already canceled
        * 4003 - booking cannot be canceled. The reason is provided in the `msg` field.
      requestBody:
        content:
          application/json:
            examples:
              CancelBooking:
                summary: CancelBooking
                value:
                  verb: CancelBooking
                  ota_property_id: lake_view_hotel
                  ota_property_password: very-secret-password
                  ota_property_sub_id: '10034818'
                  mya_property_id: 25678
                  guid: 6C08B96E-450D-4E6A-9933-7D0305730305
                  ota_cid: ota
                  shared_secret: s3cr3ts4uc3
                  booking_id: H7736-29385551
                  reason: Guest called and requested cancellation
            schema:
              allOf:
                - $ref: '#/components/schemas/auth'
                - type: object
                  properties:
                    verb:
                      type: string
                      enum:
                        - CancelBooking
                    booking_id:
                      type: string
                      description: |
                        OTA booking ID of the booking to be cancelled.
                    reason:
                      type: string
                      description: |
                        Free text reason given by property as to why the booking was cancelled.
              required:
                - verb
                - booking_id
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                Failure:
                  summary: Booking has already departed
                  value:
                    success: false
                    errors:
                      - id: 4001
                        msg: Booking has already departed
                Success:
                  summary: Success
                  value:
                    success: true
              schema:
                $ref: '#/components/schemas/response_simple'
          description: CancelBooking
      summary: CancelBooking
      tags:
        - Bookings
  /CreateProperty:
    post:
      operationId: create_property
      description: |-
        Can be used to create a new property (including rooms) on your OTA based on
        the details that we have in Cloudbeds (eg. property name, address, images,
        room details, etc). This call needs to be activated explicitly from our side
        before you can use it. Please talk to your Cloudbeds contact before
        implementing this call!

        Rate plan information was added at a later date and is only transmitted for
        new build-to-us implementations or if the feature has been enabled
        explicitly. Note that every room has a default rate plan, and the ID
        (even across different rooms) is always `0`.

        Once approved please provide us with your terms & conditions for us to
        display to a property. You should provide them as a HTML file with only
        basic styling.

