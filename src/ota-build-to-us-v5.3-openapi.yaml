                            address_line_2:
                              type:
                                - string
                                - 'null'
                              description: Second address line of the company or property owner (if applicable)
                            state:
                              type:
                                - string
                                - 'null'
                              description: State of the company or property owner (if applicable)
                            zip:
                              type:
                                - string
                                - 'null'
                              description: Post Code (ZIP) of the company or property owner
                            city:
                              type:
                                - string
                                - 'null'
                              description: City or locality the company or property owner is located in
                            country:
                              type: string
                              pattern: ^[A-Z]{2}$
                              description: |
                                2-letter ISO 3166-1 alpha-2 country code. This is the country the the company or property owner is located in.
                          required:
                            - country
                        images:
                          type: array
                          description: List of property-level images
                          items:
                            type: object
                            properties:
                              url:
                                type: string
                                description: Publicly accessible URL to the full resolution image
                              description:
                                type: string
                                description: Description of the image to show on a channel (max. 2000 characters)
                              sort_order:
                                type: integer
                                minimum: 0
                                description: |
                                  Number indicating the displayed sort order. Lower numbers means further left/top. Defaults to 0.
                        rooms:
                          type: array
                          description: List of rooms configured for the property
                          items:
                            type: object
                            properties:
                              mya_room_id:
                                type: integer
                                minimum: 1
                                description: Room ID on the Cloudbeds channel manager.
                              units:
                                type: integer
                                minimum: 1
                                description: How many rooms of this type there are.
                              beds:
                                type: integer
                                minimum: 1
                                description: Number of people that can stay in this room.
                              max_adults:
                                type: integer
                                minimum: 1
                                description: Maximum number of adults that can stay in this room.
                              max_children:
                                type: integer
                                minimum: 0
