  /ARIFullRefresh:
    post:
      operationId: ari_full_refresh
      description: |
        **Endpoint:** `https://api.myallocator.com/callback/ota/{ota}/v202203` (replace `{ota}` with your channel ID)

        This is for technical support on the remote OTA to enqueue a full refresh of the property. You may use either `ota_property_id` (it may be resolved into a number of Cloudbeds channel manager IDs) or `mya_property_id`.
        Note that full refreshes are heavy operations, so only call this when absolutely necessary. Under no circumstances use this callback on a scheduled basis.
      servers:
        - url: https://api.myallocator.com/callback/ota/{ota}/v202203
          variables:
            ota:
              description: OTA channel ID as assigned by Cloudbeds
              default: replace_with_ota_id
      requestBody:
        content:
          application/x-www-form-urlencoded:
            examples:
              ARIFullRefresh:
                summary: ARIFullRefresh
                value:
                  mya_property_id: 998201
                  shared_secret: s3cr3ts4uc3
            schema:
              type: object
              properties:
                mya_property_id:
                  description: Property ID on the Cloudbeds channel manager
                  type: integer
                  minimum: 1
                ota_property_id:
                  description: |
                    Username, login or property ID on the OTA. Don't use this if the OTA support multiple properties under one login.
                  type: string
                ota_property_sub_id:
                  description: |
                    Property ID on the OTA, if OTA supports multiple properties under one `ota_property_id`/`ota_property_password` combination. See `GetSubProperties` for more details.
                  type: string
                shared_secret:
                  description: Authentication between the OTA and the channel. Identical for all requests. Not to be shared with customers.
                  type: string
              required:
                - shared_secret
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                Success:
                  summary: Success
                  value:
                    Success: true
                    UpdateId: 99277138491
                Failure:
                  summary: Failure
                  value:
                    Success: false
                    ErrorCode: 1031
                    Error: Channel not enabled for property
              schema:
                oneOf:
                  - title: Successful request
                    type: object
                    properties:
                      Success:
                        type: boolean
                        enum:
                          - true
                        description: Always `true` on success.
                      UpdateId:
                        type: integer
                        minimum: 1
                        description: |
                          If present indicates that at least one full refresh was enqueued into Cloudbeds to be sent to the OTA.
                    required:
                      - Success
                  - $ref: '#/components/schemas/response_callback_error'
          description: ARIFullRefresh
      summary: ARIFullRefresh
      tags:
        - Callbacks
  /CheckAvailability:
    post:
      operationId: check_availability
      description: |-
        **Endpoint:** `https://api.myallocator.com/callback/ota/{ota}/v202203` (replace `{ota}` with your channel ID)

        Use this callback to check if a room (rateplan) is available for booking.

        Although information about specific room (rateplan) availability is supposed to be present locally on a channel side,
        we would like to provide an opportunity to double check if a room (rateplan) is available prior to creating a
        reservation. Using this callback ensures that due to a possible technical issue leading to a room (rateplan)
        availability numbers not having been (or having been incorrectly / not in time) delivered to a channel, the room
        is not overbooked and therefore helps avoid both host and guest frustration when such an over-booking has to be canceled by a host
        due to physical inability to accomodate.
      servers:
        - url: https://api.myallocator.com/callback/ota/{ota}/v202203
          variables:
            ota:
              description: OTA channel ID as assigned by Cloudbeds
              default: replace_with_ota_id
      requestBody:
        content:
          application/x-www-form-urlencoded:
            examples:
              CheckAvailability:
                summary: CheckAvailability
                value:
                  shared_secret: s3cr3ts4uc3
                  ota_property_id: '998201'
                  ota_room_id: '12345'
                  ota_rateplan_id: '11'
                  start_date: '2027-01-01'
                  end_date: '2027-01-02'
                  unit_type: room
                  number_of_units: 1
            schema:
              type: object
              properties:
                ota_property_id:
                  description: Username, login or property ID on the OTA
                  type: string
                ota_room_id:
                  type: string
                  description: Room ID on the OTA
                ota_rateplan_id:
                  type: string
                  description: Room rateplan ID on the OTA (In case OTA supports rateplans)
                start_date:
                  type: string
                  format: date
                  description: Desired check in date
                end_date:
                  type: string
                  format: date
                  description: Desired check out date
                unit_type:
                  type: string
                  enum:
                    - room
                    - bed
                  description: Room availability can be checked by number of rooms or by number of guests (beds) to stay. We recommend using `bed` in case a room is a dormitory/shared room and is sold by beds.
                number_of_units:
                  type: integer
                  description: Number of rooms or beds to check availability for
                shared_secret:
                  description: Authentication between the OTA and the channel. Identical for all requests. Not to be shared with customers.
                  type: string
              required:
                - shared_secret
                - ota_property_id
                - ota_room_id
                - ota_rateplan_id
                - start_date
                - end_date
                - unit_type
                - number_of_units
            encoding:
              booking_json:
                contentType: application/json
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                Success:
                  summary: Success
                  value:
                    Success: true
                    is_available: true
                Failure:
                  summary: Failure
                  value:
                    Success: false
                    ErrorCode: 1031
                    Error: Channel not enabled for property
              schema:
                oneOf:
                  - title: Successful Request
                    type: object
                    properties:
                      Success:
                        type: boolean
                        enum:
                          - true
                        description: This field indicates that a request has been processed successfully. The value of this field does NOT indicate room availability.
                      is_available:
                        description: This field indicates whether or not the requested room(s) (rateplan) is(are) available for booking
                        type: boolean
                      reasons_unavailable:
                        description: If room(s) (rateplan) is(are) is not available for booking, this field contains explanations as to why
                        type: array
                        items:
                          type: object
                          properties:
                            text:
                              type: string
                              description: Reason text
                            related_dates:
                              description: Related dates
                              type: array
                              items:
                                type: string
                                format: date
                  - $ref: '#/components/schemas/response_callback_error'
          description: CheckAvailability
      summary: CheckAvailability
      tags:
        - Callbacks
  /BookingCreate:
    post:
      operationId: booking_create
      description: |-
        **Endpoint:** `https://api.myallocator.com/callback/ota/{ota}/v202203` (replace `{ota}` with your channel ID)

        Use this callback to send us new bookings. Using this callback ensures that
        there is no delay between the creation of the booking and import on
        Cloudbeds. Therefore it's strongly recommend to implement this callback.
        Even when implemented it's still necessary to also implement the
        `GetBookingList` and `GetBookingId` calls, which act as fallbacks if
        the `CreateBooking` notification fails, when a reimport due to processing
        issues on Cloudbeds is necessary, or when a specific booking needs to be
        debugged.

        The booking format is identical to what is being returned in the
        `GetBookingId` call. The booking format is described
        [here in full detail](https://github.com/MyAllocator/build2us-apidocs/blob/gh-pages/booking_format_b2u.md).

        See the documentation about `GetBookingId` for more details on the format.
        The specification listed here is not complete and just the minimal
        requirement.

        The `booking_json` form field is expected to be JSON encoded. Note that the
        example shown on the right is not rendering correctly due to a bug with the
        specification renderer. `mya_property_id`, `shared_secret` and
        `booking_json` should be submitted as form fields.
      servers:
        - url: https://api.myallocator.com/callback/ota/{ota}/v202203
          variables:
            ota:
              description: OTA channel ID as assigned by Cloudbeds
              default: replace_with_ota_id
      requestBody:
        content:
          application/x-www-form-urlencoded:
            examples:
              BookingCreate:
                summary: BookingCreate
                value:
                  mya_property_id: 998201
                  shared_secret: s3cr3ts4uc3
                  booking_json: |
                    {
                      "OrderId": "123456789",
                      "OrderDate": "2018-04-22",
                      "OrderTime": "18:02:58",
                      "IsCancellation": 0,
                      "TotalCurrency": "USD",
                      "TotalPrice": 134,
                      "Customers": [
                        {
                          "CustomerCountry": "US",
                          "CustomerEmail": "test@test.com",
                          "CustomerFName": "Test Firstname",
                          "CustomerLName": "Test Lastname"
                        }
                      ],
                      "Rooms": [
                        {
                          "ChannelRoomType": "abcdef",
                          "Currency": "USD",
                          "DayRates": [
                            {
                              "Date": "2017-11-08",
                              "Description": "Refundable Rate",
                              "Rate": 32.5,
                              "Currency": "USD",
                              "RateId": "13649"
                            },
                            {
                              "Date": "2017-11-09",
                              "Description": "Refundable Rate",
                              "Rate": 34.5,
                              "Currency": "USD",
                              "RateId": "13649"
                            }
                          ],
                          "StartDate": "2017-11-08",
                          "EndDate": "2017-11-09",
                          "Price": 134,
                          "Units": 2
                        }
                      ]
                    }
            schema:
              type: object
              properties:
                mya_property_id:
                  description: Property ID on the Cloudbeds channel manager
                  type: integer
                  minimum: 1
                ota_property_id:
                  description: Username, login or property ID on the OTA
                  type: string
                ota_property_sub_id:
                  type: string
                  description: |
                    Property ID on the OTA, if OTA supports multiple properties under one `ota_property_id`/`ota_property_password` combination. See `GetSubProperties` for more details.
                shared_secret:
                  description: Authentication between the OTA and the channel. Identical for all requests. Not to be shared with customers.
                  type: string
                booking_json:
                  type: string
                  description: |
                    The booking payload encoded in JSON. See the response for `GetBookingId` for a minimal example and check the "Booking Format" section of this documentation.
              required:
                - shared_secret
                - booking_json
            encoding:
              booking_json:
                contentType: application/json
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                Success:
                  summary: Success
                  value:
                    Success: true
                Failure:
                  summary: Failure
                  value:
                    Success: false
                    ErrorCode: 1031
                    Error: Channel not enabled for property
              schema:
                oneOf:
                  - title: Successful Request
                    type: object
                    description: |
                      No returned error means the booking has been enqueued into Cloudbeds for import.
                    properties:
                      Success:
                        type: boolean
                        enum:
                          - true
                        description: Always `true` on success.
                    required:
                      - Success
                  - $ref: '#/components/schemas/response_callback_error'
          description: BookingCreate
      summary: BookingCreate
      tags:
        - Callbacks
  /NotifyBooking:
    post:
      operationId: notify_booking
      description: |-
        **Endpoint:** `https://api.myallocator.com/callback/ota/{ota}/v202203` (replace `{ota}` with your channel ID)

        With this API call the OTA can notify Cloudbeds to immediately request a
        `GetBookingList` call based on the `ota_property_id`/`ota_property_sub_id`
        and the passed `booking_id`. This should be send on any new booking OR any
        changes such as cancellations to an existing booking.

        If the `BookingCreate` API call has been implemented then `NotifyBooking`
        is not required.

        Note: at this time we're not only sending a `GetBookingId` call with the
        `booking_id` given in this API call. Cloudbeds instead calls
        `GetBookingList` as usual. However, in the future Cloudbeds might
        specifically request the booking provided with `NotifyBooking`.
      servers:
        - url: https://api.myallocator.com/callback/ota/{ota}/v202203
          variables:
            ota:
              description: OTA channel ID as assigned by Cloudbeds
              default: replace_with_ota_id
      requestBody:
        content:
          application/x-www-form-urlencoded:
            examples:
              NotifyBooking:
                summary: NotifyBooking
                value:
