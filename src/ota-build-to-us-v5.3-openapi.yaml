          content:
            application/json:
              examples:
                Failure:
                  summary: Block with such code does not exists
                  value:
                    success: false
                    errors:
                      - id: 2
                        msg: Block with such code does not exists
                Success:
                  summary: Success
                  value:
                    success: true
              schema:
                $ref: '#/components/schemas/response_simple'
          description: DeleteGroupBlock
      summary: DeleteGroupBlock
      tags:
        - Groups
  /ChannelList:
    post:
      operationId: channel_list
      description: |
        **Endpoint:** `https://api.myallocator.com/callback/ota/{ota}/v202203` (replace `{ota}` with your channel ID)

        Returns a list of all channels known to Cloudbeds, including their names and corresponding IDs.
      servers:
        - url: https://api.myallocator.com/callback/ota/{ota}/v202203
          variables:
            ota:
              description: OTA channel ID as assigned by Cloudbeds
              default: replace_with_ota_id
      requestBody:
        content:
          application/json:
            examples:
              ChannelList:
                summary: ChannelList
                value:
                  verb: ChannelList
                  guid: 6C08B96E-450D-4E6A-9933-7D0305730305
                  ota_cid: ota
                  shared_secret: s3cr3ts4uc3
            schema:
              type: object
              properties:
                guid:
                  description: Request reference ID, used for debugging and support requests.
                  type: string
                  pattern: ^[0-9a-fA-F]{8}-([0-9a-fA-F]{4}-){3}[0-9a-fA-F]{12}$
                shared_secret:
                  description: Authentication between the OTA and the channel. Identical for all requests. Not to be shared with customers.
                  type: string
                ota_cid:
                  description: OTA ID as given by Cloudbeds
                  type: string
                  pattern: ^[a-z0-9]+$
                verb:
                  type: string
                  enum:
                    - ChannelList
              required:
                - guid
                - shared_secret
                - ota_cid
                - verb
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                Failure:
                  summary: Something went wrong
                  value:
                    success: false
                    errors:
                      - id: 666
                        msg: Internal server error
                Success:
                  summary: Success
                  value:
                    success: true
                    channels:
                      - channel_id: boo
                        name: Booking.com
                      - channel_id: exp
                        name: Expedia
              schema:
                oneOf:
                  - type: object
                    title: Success
                    properties:
                      success:
                        type: boolean
                        enum:
                          - true
                      channels:
                        type: array
                        items:
                          type: object
                          properties:
                            channel_id:
                              type: string
                              pattern: ^[a-z0-9]+$
                              description: Unique channel ID (2-4 characters)
                            name:
                              type: string
                              description: Name for the channel
                          required:
                            - channel_id
                            - name
                    required:
                      - success
                      - channels
                  - $ref: '#/components/schemas/response_error'
          description: ChannelList
      summary: ChannelList
      tags:
        - Callbacks
components:
  securitySchemes:
    shared_secret:
      type: apiKey
      in: query
      name: shared_secret
      description: Authentication between the OTA and the channel manager. Identical for all requests. Not to be shared with customers.
  schemas:
    response_simple:
      type: object
      title: Standard Response
      properties:
        errors:
          description: Array of error objects. Required when `success` is `false`.
          type: array
          items:
            description: Error object
            type: object
            properties:
              id:
                type: integer
                minimum: 1
                description: |
                  Error code. Check the "Error Codes" section of the specification for valid codes.
              msg:
                type: string
                description: |
                  Optional error string to give more details about the error. Myallocator localises errors into different languages, so this field is generally ignored and only useful for debugging.
            required:
              - id
        success:
          type: boolean
          enum:
            - true
            - false
      required:
        - success
    room_info:
      type: object
      properties:
        mya_room_id:
          type: integer
          minimum: 1
          description: Room ID on the Cloudbeds channel manager
        units:
          type: integer
          minimum: 1
          description: How many rooms of this type there are.
        beds:
          type: integer
          minimum: 1
          description: Number people that can stay in this room.
        dormitory:
          type: boolean
          description: |
            If `true` it's a dormitory (shared room), `false` for private rooms.
        label:
          type: string
          description: |
            Short string that describes the room for displaying purposes.
        description:
          type:
            - string
            - 'null'
          description: |
            Longer description of the room which describes a room to a potential guest.
      required:
        - mya_room_id
        - units
        - beds
        - dormitory
        - label
        - description
    auth:
      type: object
      properties:
        mya_property_id:
          description: Property ID on the Cloudbeds channel manager
          type: integer
          minimum: 1
        ota_property_id:
          description: Username, login or property ID on the OTA
          type: string
        ota_property_password:
          description: Password for property on your OTA. In case the OTA does not use passwords this will be an empty string.
          type: string
        ota_property_sub_id:
          type: string
          description: |
            Property ID on the OTA, if OTA supports multiple properties under one `ota_property_id`/`ota_property_password` combination. See `GetSubProperties` for more details.
        guid:
          description: Request reference ID, used for debugging and support requests.
          type: string
          pattern: ^[0-9a-fA-F]{8}-([0-9a-fA-F]{4}-){3}[0-9a-fA-F]{12}$
        shared_secret:
          description: Authentication between the OTA and the channel. Identical for all requests. Not to be shared with customers.
          type: string
        ota_cid:
          description: OTA ID as given by Cloudbeds
          type: string
          pattern: ^[a-z0-9]+$
      required:
        - guid
        - mya_property_id
        - ota_property_id
        - ota_property_password
        - ota_property_sub_id
        - shared_secret
        - ota_cid
    response_error:
      type: object
      title: Error Response
      properties:
        errors:
          description: Array of error objects.
          type: array
          items:
            description: Error object
            type: object
            properties:
              id:
                type: integer
                minimum: 1
                description: |
                  Error code. Check the "Error Codes" section of the specification for valid codes.
              msg:
                type: string
                description: |
                  Optional error string to give more details about the error. Myallocator localises errors into different langauges, so this field is generally ignored and only useful for debugging.
            required:
              - id
        success:
          type: boolean
          enum:
            - false
      required:
        - errors
        - success
    booking:
      type: object
      description: |
        Object describing the booking. The fields listed here are just the minimum required fields.
      properties:
        OrderId:
          type: string
          description: Unique booking ID on the OTA. Maximum of 64 characters.
        OrderAdults:
          type: integer
          minimum: 0
          description: |
            Total number of unique adults. Adult age threshold is defined by the channel. Should equal sum of Adults in each room if this breakdown is given.
        OrderChildren:
          type: integer
          minimum: 0
          description: |
            Total number of unique children or babies. Child/baby age threshold is defined by the channel. Should equal sum of `Children` plus `Babies` in each room if this breakdown is given.
        OrderCustomers:
          type: integer
          minimum: 1
          description: |
            Total number of unique customers. Should equal sum of `Occupancy` in each room if this breakdown is given. Should also equal the sum of `OrderAdults` and `OrderChildren` if those fields are present.
        OrderDate:
          type: string
          format: date
          description: Date of booking creation, in UTC (not date when modified!).
        OrderTime:
          type: string
          pattern: ^([01]\d|2[0-3]):[0-5]\d:[0-5]\d$
          description: |
            Time of booking creation, in UTC. If seconds are not provided, set value to ":00". Presence of `OrderTime` requires presence of `OrderDate`.
        OrderModifDate:
          type: string
          format: date
          description: |
            Date of booking modification, in UTC. Do not pass if booking has not been modified.
        OrderModifTime:
          type: string
          pattern: ^([01]\d|2[0-3]):[0-5]\d:[0-5]\d$
          description: |
            Time of booking modification, in UTC. Do not pass if booking has not been modified. If seconds are not provided, set value to ":00".
        IsCancellation:
          type: integer
          enum:
            - 0
            - 1
          description: '`1` if booking is cancelled.'
        IsModification:
          type: integer
          enum:
            - 0
            - 1
          description: '`1` if booking is modified.'
        TotalCurrency:
          type: string
          pattern: ^[A-Z]{3}$
          description: |
            3-letter ISO 4217 currency code for the `TotalPrice` field.
        TotalPrice:
          type: number
          description: |
            Total price of the booking, including taxes, commission and deposit, after discounts. It should reflect the price the guest will have to pay in total (or has already paid).
        PaymentCollect:
          type: string
          enum:
            - Property
            - Channel
          description: |
            Who collects outstanding balance from the guest? `Property` means that the property takes the payment, either by charging the credit card, or on arrival. `Channel` means that the channel will take the payment, and the property is paid by the channel. Do not set this to `Channel` if you are only collecting the commission/deposit.
        Customers:
          type: array
          items:
            type: object
            properties:
              CustomerCountry:
                type: string
                pattern: ^[A-Z]{2}$
                description: 2-letter ISO 3166-1 alpha-2 country code in which the customer resides, corresponding to their address. Value is uppercase.
              CustomerEmail:
                type: string
                format: email
                description: Email address of the customer.
              CustomerFName:
                type: string
                description: |
                  First name(s) of the customer. If the name is not stored separated by first and last name, provide full name in `CustomerLName`.
              CustomerLName:
                type: string
                description: Last (family) name or full name of the customer.
            required:
              - CustomerCountry
              - CustomerEmail
              - CustomerFName
              - CustomerLName
        Rooms:
          type: array
          description: List of rooms booked
          items:
            type: object
            properties:
              Adults:
                type: integer
                minimum: 0
                description: |
                  Number of adults staying in this room. Adult age threshold is defined by the channel.
              Babies:
                type: integer
                minimum: 0
                description: |
                  Number of babies staying in this room. Baby age threshold is defined by the channel.
              ChannelRoomType:
                type: string
                description: The ID of the room on the OTA.
              Children:
                type: integer
                minimum: 0
                description: |
                  Number of children staying in this room. Child age threshold is defined by the channel.
              Currency:
                type: string
                pattern: ^[A-Z]{3}$
                description: |
                  3-letter ISO 4217 currency code for the `Price` field.
              DayRates:
                type: array
                description: |
                  Contains as many objects as the number of nights of the room stay. They need to be sorted by date.
                items:
                  type: object
                  properties:
                    Date:
                      type: string
                      format: date
                      description: Date of day rate.
                    Description:
                      type: string
                      description: |
                        Name or short description of the rateplan booked. Example: "Non-refundable rate" or "10% festival discount".
                    Rate:
                      type: number
                      description: |
                        Price for this day, including `Commission` and `Tax`.
                    Currency:
                      type: string
                      pattern: ^[A-Z]{3}$
                      description: |
                        3-letter ISO 4217 currency code for the `Rate` field.
                    RateId:
                      type: string
                      description: Applicable channel rate plan ID for this day rate.
                  required:
                    - Date
                    - Description
                    - Rate
                    - Currency
                    - RateId
              StartDate:
                type: string
                format: date
                description: Arrival date of the customer.
              EndDate:
                type: string
                format: date
                description: |
                  The date of the last night of stay (equal to departure date minus one).
              Occupancy:
                type: integer
                minimum: 1
                description: |
                  Total number of persons staying in this room, including children and babies. Should be the sum of `Adults`, `Children` and `Babies` if those are present.
              Price:
                type: number
                minimum: 0
                description: |
                  Total price of the room, for all units and all days, including taxes and fees. Example: stay is for two days and three units and a single night costs €10 (including tax), then `Price` is 2 * 3 * 10 = 60.
              Units:
                type: integer
                minimum: 1
                description: |
                  Number of rooms booked (for private rooms) or number of beds booked (for dorms/shared rooms).
              RateDesc:
                type: string
                description: Description of the booked rate plan, as provided by the channel.
              RateId:
                type: string
                description: |
                  Applicable rate plan ID for this booking. Normally there is only one. If there are multiple, list them comma-separated.
            required:
              - Adults
              - Babies
              - ChannelRoomType
              - Children
              - Currency
              - DayRates
              - EndDate
              - Occupancy
              - Price
              - RateDesc
              - RateId
              - StartDate
              - Units
      required:
        - Customers
        - IsCancellation
        - IsModification
        - OrderAdults
        - OrderChildren
        - OrderCustomers
        - OrderDate
        - OrderId
        - OrderTime
        - PaymentCollect
        - Rooms
        - TotalCurrency
        - TotalPrice
    tax_conditions:
      type: array
      description: |
        Array of conditions that determine if this amount will be applied.
      items:
        type: object
        properties:
          min_start:
            type: string
            description: |
              Amount of parameter above which tax is applied. For example, if `condition_parameter` is "total-price" and here we have 200, this means that tax/fee is applied when total price is more or equal 200.
          max_end:
            type: string
            description: |
              Amount of parameter below which tax is applied. For example, if `condition_parameter` is "total-price" and here we have 200, this means that tax/fee is applied when total price is less or equal 200.
          one_of:
            type: array
            description: |
              List of values of a parameter. For example, if `condition_parameter` is "day-of-week" then ["SAT","SUN"] might be here.
            items:
              type: string
          max_end_inclusive:
            type: boolean
            default: true
            description: |
              Whether the `max_end` parameter is inclusive (less or equal) or not (strictly less).
          min_start_inclusive:
            type: boolean
            default: true
            description: |
              Whether the `min_start` parameter is inclusive (greater or equal) or not (strictly greater).
          condition_parameter:
            type: string
            description: |
              Parameter that determines whether this tax/fee will be applied or not.
            enum:
              - adult-age
              - booking-date
              - checkin-date
              - checkout-date
              - child-age
              - date-in-range
              - day-of-week
              - length-of-stay
              - length-of-stay-progressive
              - length-of-stay-retroactive
              - night-number
              - nightly-rate
              - nights-booked-in-advance
              - number-of-guests
              - number-of-nights
              - number-of-pets
              - payment-type
              - product-code-id
              - rate-type
              - room-id
              - stay-dates-intersect
              - total-price
        required:
          - condition_parameter
    tax_info:
      type: object
      properties:
        id:
          type: integer
          minimum: 1
          description: Tax/fee ID in Cloudbeds' system
        is_fee:
          type: boolean
          description: '`true` if it''s a fee, otherwise it''s a tax.'
        is_inclusive:
          type: boolean
          default: true
          description: '`true` when tax/fee included in rate.'
        is_per_night:
          type: boolean
          default: true
          description: '`true` when tax/fee is per night, otherwise per stay.'
        is_percent:
          type: boolean
          default: true
          description: '`true` when amount represents percentage, otherwise absolute value.'
        is_refundable:
          type: boolean
          default: true
          description: For example, refundable damage deposit fee will set this `true`.
        amount:
          type: number
          description: |
            Tax/fee amount. Either amount in currency or percent, depending on `is_percent` field. For example 20.5 can mean 20.5% or $20.5. Only one element either `amount` or `amounts` is supposed to be active, not both.
        amounts:
          type: array
          description: |
            Array of tax/fee amounts. Multiple amounts may apply at the same time depending on the conditions for each item. Only one element either `amount` or `amounts` is supposed to be active, not both.
          items:
            type: object
            properties:
              amount:
                description: Tax/fee amount. Either amount in currency or percent, depending on is_percent field. For example 20.5 can mean 20.5% or $20.5.
                type: number
              conditions:
                $ref: '#/components/schemas/tax_conditions'
            required:
              - amount
        category:
          type: string
          description: |
            Tax category.
          enum:
            - municipal_tax
            - occupancy_tax
            - other_fee
            - other_tax
            - resort_tax
            - sales_tax
            - service_charge
            - tourism_tax
            - vat
        code:
          type: string
          description: Issued by federal government tax/fee code.
        external_id:
          type: string
          description: |
            Optional custom field to store an external system ID. Not guaranteed to be unique.
        name:
          type: string
          description: Tax/fee name.
        applies_per:
          type: string
          description: |
            To which entity tax/fee is applied.
          enum:
            - adult
            - all-adults
            - booking
            - booking-external-item
            - child
            - children
            - guest
            - pet
            - pets
            - rateplan
            - room
            - room-type
            - service
        conditions:
          $ref: '#/components/schemas/tax_conditions'
        tax_basis_includes_fees:
          type: array
          items:
            type: object
            description: Array of fee IDs which will be summed up before calculating this tax. Depends on calculation_basis.
            properties:
              fee_id:
                type: integer
                description: ID of a fee
                minimum: 1
            required:
              - fee_id
        calculation_basis:
          type: string
          description: |
            To what value percentage will be applied in order to calculate tax amount in currency. Only applicable if `is_percent` is `true`.
          enum:
            - fees
            - fees-per-night
            - rate
            - rate-and-fees
            - rate-and-fees-per-night
            - rate-per-night
      required:
        - applies_per
        - category
        - id
        - is_inclusive
        - is_per_night
        - is_percent
        - is_refundable
        - name
    response_callback_error:
      type: object
      title: Error Response
      properties:
        Success:
          type: boolean
          enum:
            - false
          description: Always `false` when the response contains an error.
        ErrorCode:
          type: integer
          minimum: 1
          description: |
            Error code. Check the "Error Codes" section of the specification for valid codes.
        Error:
          type: string
          description: Human-readable error message.
      required:
        - Success
        - ErrorCode
        - Error
    group:
      type: object
      properties:
        group_code:
          type: string
        group_name:
          type: string
        group_legal_name:
          type: string
        group_status:
          type: string
          enum:
            - open
            - close
        group_notes:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
              created_at:
                type: string
              updated_at:
                type: string
        address:
          type: object
          properties:
            city:
              type: string
            zip:
              type: string
            state:
              type: string
            address_line1:
              type: string
            address_line2:
              type: string
            country_code:
              type: string
        contacts:
          type: array
          items:
            type: object
            properties:
              first_name:
                type: string
              last_name:
                type: string
              emails:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - personal
                        - business
                    value:
                      type: string
              phones:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - home
                        - work
                        - mobile
                        - fax
                    value:
                      type: string
              role:
                type: string
              legal_name:
                type: string
              city:
                type: string
              zip:
                type: string
              state:
                type: string
              address_line1:
                type: string
              address_line2:
                type: string
              country_code:
                type: string
