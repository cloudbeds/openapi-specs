                  value:
                    success: true
                    ota_property_id: CID_123
                    ota_property_password: secret_password
                    instruction_text: |-
                      It worked!

                      Now click the link.
                    instruction_link: https://ota.com/instructions
                    room_mappings:
                      - ota_room_id: '11111'
                        mya_room_id: 45829
                        ota_rate_id: rp6623
                        mya_rate_id: 0
                      - ota_room_id: '11111'
                        mya_room_id: 45829
                        ota_rate_id: rp6624
                        mya_rate_id: 850
                      - ota_room_id: '11111'
                        mya_room_id: 45829
                        ota_rate_id: rp6624
                        mya_rate_id: 851
                      - ota_room_id: '22222'
                        mya_room_id: 290
                        ota_rate_id: rp6625
                        mya_rate_id: 0
                      - ota_room_id: '22222'
                        mya_room_id: 290
                        ota_rate_id: rp6626
                        mya_rate_id: 853
              schema:
                oneOf:
                  - type: object
                    title: Successful creation
                    properties:
                      success:
                        type: boolean
                        enum:
                          - true
                      ota_property_id:
                        type: string
                        description: New property ID on the OTA
                      ota_property_password:
                        type: string
                        description: |
                          If the OTA uses passwords this will authenticate the property on the OTA. We'll automatically save the password.
                      ota_property_sub_id:
                        type: string
                        description: |
                          If the channel supports multiple properties under one account, this sub-property ID will be saved and included in future API calls for this property.
                      instruction_text:
                        type: string
                        description: |
                          The instruction text will be displayed to the hotel after the property creation is complete. We will escape any HTML characters, so please only return plain text. You can include linebreaks (`\n`) which will be converted into actual line breaks for HTML display.
                      instruction_link:
