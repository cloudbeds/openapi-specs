  /RoomInfo:
    post:
      operationId: room_info
      description: |-
        **Endpoint:** `https://api.myallocator.com/callback/ota/{ota}/v202203` (replace `{ota}` with your channel ID)

        Returns the rooms configured on Cloudbeds. It's only necessary for deep
        integrations or situations where the OTA plans to automatically/create
        destroy rooms using Cloudbeds' configuration. In a normal integration this
        isn't very common.
      servers:
        - url: https://api.myallocator.com/callback/ota/{ota}/v202203
          variables:
            ota:
              description: OTA channel ID as assigned by Cloudbeds
              default: replace_with_ota_id
      requestBody:
        content:
          application/x-www-form-urlencoded:
            examples:
              RoomInfo:
                summary: RoomInfo
                value:
                  mya_property_id: 998201
                  shared_secret: s3cr3ts4uc3
            schema:
              type: object
              properties:
                mya_property_id:
                  description: Property ID on the Cloudbeds channel manager
                  type: integer
                  minimum: 1
                shared_secret:
                  description: Authentication between the OTA and the channel. Identical for all requests. Not to be shared with customers.
                  type: string
              required:
                - mya_property_id
                - shared_secret
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                Success:
                  summary: Success
                  value:
                    Success: true
                    RoomInfo:
                      - mya_room_id: 45829
                        units: 5
                        beds: 2
                        dormitory: false
                        label: Double Room
                        description: A potentially long description about the room
                      - mya_room_id: 290
                        units: 25
                        beds: 4
                        dormitory: false
                        label: 4-person private
                        description: null
                Failure:
                  summary: Failure
                  value:
                    Success: false
                    ErrorCode: 9203
                    Error: mya_property_id is invalid
              schema:
                oneOf:
                  - title: Successful Request
                    type: object
                    properties:
                      Success:
                        type: boolean
                        enum:
                          - true
                        description: Always `true` on success.
                      RoomInfo:
                        type: array
                        description: |
                          List of rooms configured on Cloudbeds.
                        items:
                          $ref: '#/components/schemas/room_info'
                    required:
                      - Success
                      - RoomInfo
                  - $ref: '#/components/schemas/response_callback_error'
          description: RoomInfo
      summary: RoomInfo
      tags:
        - Callbacks
