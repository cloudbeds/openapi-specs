                              label:
                                type: string
                                description: |
                                  Short string that describes the room for displaying purposes.
                              description:
                                type:
                                  - string
                                  - 'null'
                                description: |
                                  Longer description of the room which describes a room to a potential guest.
                              images:
                                type: array
                                description: List of room-level images.
                                items:
                                  type: object
                                  properties:
                                    url:
                                      type: string
                                      description: Publicly accessible URL to the full resolution image
                                    description:
                                      type:
                                        - string
                                        - 'null'
                                      description: Description of the image to show on a channel (max. 2000 characters)
                                    sort_order:
                                      type: integer
                                      minimum: 0
                                      description: |
                                        Number indicating the displayed sort order. Lower numbers means further left/top. Defaults to 0.
                                  required:
                                    - url
                                    - description
                                    - sort_order
                              rateplans:
                                type: array
                                description: List of rate plans configured for the room
                                items:
                                  type: object
                                  properties:
                                    mya_rate_id:
                                      type: integer
                                      minimum: 0
                                      description: |
                                        Rate plan ID on the Cloudbeds channel manager. Every room has a default rate plan, and the ID (even across different rooms) is always `0`. Any non-default rate plans have a higher ID.
                                    label_public:
                                      type:
                                        - string
                                        - 'null'
                                      description: |
                                        Name or short summary of the rate plan, suitable for display to guests. The label is chosen by the property.
                                    label_private:
                                      type:
                                        - string
                                        - 'null'
                                      description: |
