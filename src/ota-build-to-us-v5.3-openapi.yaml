openapi: 3.1.2
info:
  title: Cloudbeds OTA Build-To-Us API
  version: '5.5'
  contact:
    url: https://www.cloudbeds.com/partner-with-cloudbeds/
  license:
    name: Cloudbeds API Terms
    url: https://www.cloudbeds.com/terms/api/
  description: API for Online Travel Agencies (OTAs) to integrate with the Cloudbeds channel manager. Enables pushing availability, rates, and restrictions (ARI), managing property setup, and retrieving bookings.
servers:
  - url: https://api.your-ota.com/cloudbeds
    description: OTA endpoint
security:
  - shared_secret: []
tags:
  - name: Connection
    description: Health checks, property setup, and sub-property discovery.
  - name: Content
    description: Manage property details, rooms, rate plans, and taxes.
  - name: Rooms & Rate Plans
    description: Manage room types, rate plans, and room information.
  - name: ARI
    description: Push and refresh availability, rates, and restrictions.
  - name: Bookings
    description: Retrieve, create, acknowledge, and cancel bookings.
  - name: Groups
    description: Manage group bookings and room blocks.
  - name: Callbacks
    description: Endpoints called by Cloudbeds to the OTA.
paths:
  /HealthCheck:
    post:
      operationId: health_check
      description: |
        Called prior to `SetupProperty` or other configuration requests to verify proper operation. Should always return true.
      requestBody:
        content:
          application/json:
            examples:
              HealthCheck:
                summary: HealthCheck
                value:
                  verb: HealthCheck
                  ota_property_id: ''
                  ota_property_password: ''
                  ota_property_sub_id: ''
                  mya_property_id: ''
                  guid: 6C08B96E-450D-4E6A-9933-7D0305730305
                  ota_cid: ota
                  shared_secret: s3cr3ts4uc3
            schema:
              type: object
              properties:
                mya_property_id:
                  oneOf:
                    - type: integer
                      description: Property ID on the Cloudbeds channel manager if already set
                      minimum: 1
                    - type: string
                      enum:
                        - ''
                      description: Empty string otherwise if not previously setup
                ota_property_id:
                  description: Username, login or property ID on the OTA if already set, empty string otherwise
                  type: string
                ota_property_password:
                  description: Password for property on your OTA if already set, empty string otherwise. In case the OTA does not use passwords this will be an empty string.
                  type: string
                ota_property_sub_id:
                  type: string
                  description: |
                    Property ID on the OTA, if OTA supports multiple properties under one `ota_property_id`/`ota_property_password` combination. Empty string if not already set.
                  enum:
                    - ''
                guid:
                  description: Request reference ID, used for debugging and support requests.
                  type: string
                  pattern: ^[0-9a-fA-F]{8}-([0-9a-fA-F]{4}-){3}[0-9a-fA-F]{12}$
                shared_secret:
                  description: Authentication between the OTA and the channel. Identical for all requests. Not to be shared with customers.
                  type: string
                ota_cid:
                  description: OTA ID as given by Cloudbeds
                  type: string
                  pattern: ^[a-z0-9]+$
                verb:
                  type: string
                  enum:
                    - HealthCheck
              required:
                - verb
                - guid
                - mya_property_id
                - ota_property_id
                - ota_property_password
                - ota_property_sub_id
                - shared_secret
                - ota_cid
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                Success:
                  summary: Success
                  value:
                    success: true
                Failure:
                  summary: Failure
                  value:
                    success: false
                    errors:
                      - id: 1003
                        msg: Problems processing requests
              schema:
                $ref: '#/components/schemas/response_simple'
          description: HealthCheck
      summary: HealthCheck
      tags:
        - Connection
  /SetupProperty:
    post:
      operationId: setup_property
      description: |-
        Check/verify/validate the credentials stored in `ota_property_id` and
        `ota_property_password`. If the credentials are invalid return with error
        ID `1001`. If the connection needs to be enabled from the OTA side first
        return with error ID `1002`.

        On Cloudbeds the hotel will go to the OTA setup by selecting the OTA.
        There the user will be prompted to put in the credentials
        (`ota_property_id` and `ota_property_password`), which are provided by your
        OTA. Both `ota_property_id` and `ota_property_password` will be retained by
        us and passed in every call. Should you not need two identification fields
        please let us know and we can set it to only ask for `ota_property_id`.
        However, this would mean that some kind of activation process is required
        where our customer support team enters the ID on behalf of the hotel.
        Otherwise it would be possible for the hotel to enter someone else's
        credentials.

        Implementation suggestions: `ota_property_id` should typically be a username
        or hotel ID on your OTA. The `ota_property_password` is typically a
        password used by the hotel to access your OTA's extranet or a token
        specifically for a channel manager.
      requestBody:
        content:
          application/json:
            examples:
              SetupProperty:
                summary: SetupProperty (normal)
                value:
                  verb: SetupProperty
                  ota_property_id: ''
                  ota_property_password: ''
                  ota_property_sub_id: ''
                  mya_property_id: 14524
                  guid: 6C08B96E-450D-4E6A-9933-7D0305730305
                  ota_cid: ota
                  shared_secret: s3cr3ts4uc3
              SetupProperty2:
                summary: SetupProperty (with RoomInfo)
                value:
                  verb: SetupProperty
                  ota_property_id: ''
                  ota_property_password: ''
                  ota_property_sub_id: ''
                  mya_property_id: 14524
                  guid: 6C08B96E-450D-4E6A-9933-7D0305730305
                  ota_cid: ota
                  shared_secret: s3cr3ts4uc3
                  RoomInfo:
                    - mya_room_id: 45829
                      units: 5
                      beds: 2
                      dormitory: false
                      label: Double Room
                      description: A potentially long description about the room
                    - mya_room_id: 290
                      units: 25
                      beds: 4
                      dormitory: false
                      label: 4-person private
                      description: null
            schema:
              type: object
              properties:
                mya_property_id:
                  description: Property ID on the Cloudbeds channel manager
                  type: integer
                  minimum: 1
                ota_property_id:
                  type: string
                  description: User ID on the OTA
                ota_property_password:
                  type: string
                  description: Password on the OTA, if supported
                ota_property_sub_id:
                  type: string
                  description: |
                    If multiple properties are supported for a set of `ota_property_id` and `ota_property_password`, this is the ID identifying a specific property.
                guid:
                  description: Request reference ID, used for debugging and support requests.
                  type: string
                  pattern: ^[0-9a-fA-F]{8}-([0-9a-fA-F]{4}-){3}[0-9a-fA-F]{12}$
                shared_secret:
                  description: Authentication between the OTA and the channel. Identical for all requests. Not to be shared with customers.
                  type: string
                ota_cid:
                  description: OTA ID as given by Cloudbeds
                  type: string
                  pattern: ^[a-z0-9]+$
                verb:
                  type: string
                  enum:
                    - SetupProperty
                RoomInfo:
                  type: array
                  description: |
                    This list of rooms will only be returned if enabled for the OTA by Cloudbeds. By default this is not present. It's only necessary for deep integrations or situations where the OTA plans to automatically/create destroy rooms using the Cloudbeds configuration. In a normal integration this isn't very usual.
                  items:
                    $ref: '#/components/schemas/room_info'
              required:
                - verb
                - guid
                - mya_property_id
                - ota_property_id
                - shared_secret
                - ota_cid
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                Success:
                  summary: Success
                  value:
                    success: true
                Failure:
                  summary: Failure (invalid credentials)
                  value:
                    success: false
                    errors:
                      - id: 1001
                        msg: The login details you provided are incorrect.
                Failure2:
                  summary: Failure (CM not enabled)
                  value:
                    success: false
                    errors:
                      - id: 1002
                        msg: Credentials not enabled for channel management.
              schema:
                $ref: '#/components/schemas/response_simple'
          description: SetupProperty
      summary: SetupProperty
      tags:
        - Connection
  /GetRoomTypes:
    post:
      operationId: get_room_types
      description: Returns a list of rooms configured for the passed credentials.
      requestBody:
        content:
          application/json:
            examples:
              GetRoomTypes:
                summary: GetRoomTypes (normal)
                value:
                  verb: GetRoomTypes
                  ota_property_id: lake_view_hotel
                  ota_property_password: very-secret-password
                  ota_property_sub_id: '10034818'
                  mya_property_id: 25678
                  guid: 6C08B96E-450D-4E6A-9933-7D0305730305
                  ota_cid: ota
                  shared_secret: s3cr3ts4uc3
              GetRoomTypes2:
                summary: GetRoomTypes (with RoomInfo)
                value:
                  verb: GetRoomTypes
                  ota_property_id: lake_view_hotel
                  ota_property_password: very-secret-password
                  ota_property_sub_id: '10034818'
                  mya_property_id: 25678
                  guid: 6C08B96E-450D-4E6A-9933-7D0305730305
                  ota_cid: ota
                  shared_secret: s3cr3ts4uc3
                  RoomInfo:
                    - mya_room_id: 45829
                      units: 5
                      beds: 2
                      dormitory: false
                      label: Double Room
                      description: A potentially long description about the room
                    - mya_room_id: 290
                      units: 25
                      beds: 4
                      dormitory: false
                      label: 4-person private
                      description: null
            schema:
              allOf:
                - $ref: '#/components/schemas/auth'
                - type: object
                  properties:
                    verb:
                      type: string
                      enum:
                        - GetRoomTypes
                    RoomInfo:
                      type: array
                      description: |
                        This list of rooms will only be returned if enabled for the OTA by Cloudbeds. By default this is not present. It's only necessary for deep integrations or situations where the OTA plans to automatically/create destroy rooms using Cloudbeds configuration. In a normal integration this isn't very usual.
                      items:
                        $ref: '#/components/schemas/room_info'
              required:
                - verb
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                Success:
                  summary: Success
                  value:
                    success: true
                    Rooms:
                      - ota_room_id: DR_556
                        title: 6-bed shared dorm
                        occupancy: 6
                        dorm: true
                      - ota_room_id: PR_1952
                        title: 5-person private
                        occupancy: 5
                        dorm: false
                Failure:
                  summary: Invalid credentials sent
                  value:
                    success: false
                    errors:
                      - id: 1001
                        msg: The login details you provided are incorrect.
              schema:
                oneOf:
                  - type: object
                    title: Successful room retrieval
                    properties:
                      success:
                        type: boolean
                        enum:
                          - true
                      Rooms:
                        type: array
                        description: |
                          List of rooms on the OTA.
                        items:
                          type: object
                          properties:
                            ota_room_id:
                              type: string
                              description: Room ID on the OTA
                            title:
                              type: string
                              description: Name, label or short summary of the room type
                            occupancy:
                              type: integer
                              minimum: 1
                              description: Number of people that can stay in this room.
                            dorm:
                              type: boolean
                              description: If `true` the room is a dormitory/shared room.
                          required:
                            - ota_room_id
                            - title
                    required:
                      - success
                      - Rooms
                  - $ref: '#/components/schemas/response_error'
          description: GetRoomTypes
      summary: GetRoomTypes
      tags:
        - Rooms & Rate Plans
  /GetRatePlans:
    post:
      operationId: get_rate_plans
      description: |-
        Cloudbeds uses this call to retrieve a list of rate plans, which are
        either specific to each room, or global for all rooms.
      requestBody:
        content:
          application/json:
            examples:
              GetRatePlans:
                summary: GetRatePlans
                value:
                  verb: GetRatePlans
                  ota_property_id: lake_view_hotel
                  ota_property_password: very-secret-password
                  ota_property_sub_id: '10034818'
                  mya_property_id: 25678
                  guid: 6C08B96E-450D-4E6A-9933-7D0305730305
                  ota_cid: ota
                  shared_secret: s3cr3ts4uc3
            schema:
              allOf:
                - $ref: '#/components/schemas/auth'
                - type: object
                  properties:
                    verb:
                      type: string
                      enum:
                        - GetRatePlans
              required:
                - verb
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                Success:
                  summary: Success - specific rate plans per room
                  value:
                    success: true
                    RatePlans:
                      - ota_room_id: DR_556
                        ota_rate_id: DEF_9910
                        title: Default Rate Plan
                      - ota_room_id: PR_1952
                        ota_rate_id: NRF_7001
                        title: Non-refundable rate
                Success2:
                  summary: Success - global rate plans
                  value:
                    success: true
                    RatePlans:
                      - ota_room_id: '0'
                        ota_rate_id: DEF_9910
                        title: Default Rate Plan
                      - ota_room_id: '0'
                        ota_rate_id: NRF_7001
                        title: Non-refundable rate
                Failure:
                  summary: Invalid credentials sent
                  value:
                    success: false
                    errors:
                      - id: 1001
                        msg: The login details you provided are incorrect.
              schema:
                oneOf:
                  - type: object
                    title: Successful rate plan retrieval
                    properties:
                      success:
                        type: boolean
                        enum:
                          - true
                      RatePlans:
                        type: array
                        description: |
                          List of rate plans on the OTA.
                        items:
                          type: object
                          properties:
                            ota_room_id:
                              type: string
                              description: |
                                Room ID on the OTA tied to the rate plan. If the rate plan is available to all rooms set this to `0`.
                            ota_rate_id:
                              type: string
                              description: Rate plan ID on the OTA.  Cannot be `0`, empty string or otherwise falsy.
                            title:
                              type: string
                              description: Name, label or short summary of the rate plan
                          required:
                            - ota_room_id
                            - ota_rate_id
                            - title
                    required:
                      - success
                      - RatePlans
                  - $ref: '#/components/schemas/response_error'
          description: GetRatePlans
      summary: GetRatePlans
      tags:
        - Rooms & Rate Plans
  /ARIUpdate:
    post:
      operationId: ari_update
      description: |-
        This call is used to send availability, rates and restrictions to your OTA.
        We will combine the updates into as few date ranges as possible, and we
        split bigger updates into several API requests. We also cache data and will
        not send ARI updates if the ARI data has not changed within a certain
        timeframe. You can ask us to alter the number of `Inventory` objects we send
        per request. It's also possible to ask us to restrict maximum number of days
        per date range.

        Note that Cloudbeds only supports availability on the room level, so for
        the same `ota_room_id` and the same date range the availability will always
        be the same. Only restrictions and rates are sent on the rate plan level.
      requestBody:
        content:
          application/json:
            examples:
              ARIUpdate:
                summary: ARIUpdate
                value:
                  verb: ARIUpdate
                  ota_property_id: lake_view_hotel
                  ota_property_password: very-secret-password
                  ota_property_sub_id: '10034818'
                  mya_property_id: 25678
                  guid: 6C08B96E-450D-4E6A-9933-7D0305730305
                  currency: USD
                  ota_cid: ota
                  shared_secret: s3cr3ts4uc3
                  Inventory:
                    - ota_room_id: '61365'
                      ota_rate_id: rate_456
                      start_date: '2025-01-22'
                      end_date: '2025-02-12'
                      units: 5
                      rate: '15.00'
                      rdef_single: '12.00'
                      max_los: 14
                      min_los: 2
                      closearr: false
                      closedep: false
                      close: false
                      min_advanced_offset: 2
                      max_advanced_offset: 30
                      num_adults_included: 2
                      num_children_included: 2
                      adult_3: '8.00'
                      child_3: '5.00'
                    - ota_room_id: '61365'
                      ota_rate_id: rate_888
                      start_date: '2025-01-22'
                      end_date: '2025-02-12'
                      units: 5
                      rate: '30.00'
                      close: true
            schema:
              allOf:
                - $ref: '#/components/schemas/auth'
                - type: object
                  properties:
                    verb:
                      type: string
                      enum:
                        - ARIUpdate
                    currency:
                      type: string
                      pattern: ^[A-Z]{3}$
                      description: |
                        3-letter ISO 4217 currency code. This is the currency the property has set for the channel connection, and may differ from the property's native currency. The OTA can use this field to assert that rates are sent in the correct currency.
                    Inventory:
                      type: array
                      items:
                        type: object
                        properties:
                          ota_room_id:
                            type: string
                            description: Room ID on the OTA.
                          ota_rate_id:
                            type: string
                            description: Rate plan ID on the OTA
                          start_date:
                            type: string
                            format: date
                            description: Start date for when the sent ARI is applicable.
                          end_date:
                            type: string
                            format: date
                            description: |
                              End date for when the sent ARI is applicable. Note that this date is inclusive. For example, if the `end_date` is 2028-08-29 and we send `rate` = `20.15`, then this rate is applicable for someone staying/arriving on 2028-08-29.
                          units:
                            type: integer
                            minimum: 0
                            description: |
                              Number of rooms bookable (available) for private rooms, or for the number of beds for shared/dorm rooms.
                          rate:
                            type: string
                            pattern: ^\d+(\.\d+)?$
                            description: |
                              Price per unit for a single night.
                          rdef_single:
                            type: string
                            pattern: ^\d+(\.\d+)?$
                            description: |
                              The single use rate, if only one person is staying. This will only be present for private rooms, and only if the occupancy of this room is higher than `1`. If the value is `0` we recommend to not make the single use rate available, or to just use the same price as for `rate`.
                          num_adults_included:
                            type: integer
                            minimum: 0
                            description: |
                              Number of adults included in base rate. Sent for OBP enabled channels.
                          num_children_included:
                            type: integer
                            minimum: 0
                            description: |
                              Number of children included in base rate. Sent for OBP enabled channels.
                          max_los:
                            type: integer
                            minimum: 0
                            description: |-
                              Maximum length of stay. A guest should not be able to
                              book if they selected more nights than this value. A
                              value of `0` means that there is no restriction.

                              There are two ways to restrict bookings by this value:
                              a) Check the `max_los` value for the arrival date,
                              or b) check the `max_los` value for all days the guest
                              is intending to stay and restrict by the lowest value.
                          min_los:
                            type: integer
                            minimum: 1
                            description: |-
                              Minimum length of stay. A guest should not be able to
                              book if they selected fewer nights than this value.

                              There are two ways to restrict bookings by this value:
                              a) Check the `min_los` value for the arrival date,
                              or b) check the `min_los` value for all days the guest
                              is intending to stay and restrict by the lowest value.
                          closearr:
                            type: boolean
                            description: |
                              Restricts whether a guest can arrive within the specified date range. If `true` the guest can stay and depart within the date range, but not arrive.
                          closedep:
                            type: boolean
                            description: |
                              Restricts whether a guest can depart within the specified date range. If `true` the guest can stay and arrive within the date range, but not depart.
                          close:
                            type: boolean
                            description: |
                              Restricts whether a guest can stay within the specified date range. If `true` the guest cannot arrive, stay or depart within the date range. In many cases this is equivalent to `units` = 0, however it is also used to make specific rate plans unavailable while leaving others bookable.
                          min_advanced_offset:
                            type: integer
                            minimum: 0
                            description: |
                              Cut off restriction: Specifies the number of days before the arrival date guests are allowed to book. The value of 0 resets to no restriction, which is the default. This restriction is mainly used for properties that want to have a lot of advanced bookings by offering a heavily discounted rate if guests book at least X number of days in advance.
                          max_advanced_offset:
                            type: integer
                            minimum: 0
                            description: |
                              Last Minute restriction: The number of days before the arrival date guests can book. The value of 0 resets to no restriction, which is the default. This restriction is mainly used to boost last-minute reservations.
                          adult_3:
                            type: string
                            pattern: ^\d+(\.\d+)?$
                            description: Extra price for the 3rd adult. Additional adults follow the same pattern (adult_4, adult_5, etc.). Sent for OBP enabled channels.
                          adult_4:
                            type: string
                            pattern: ^\d+(\.\d+)?$
                            description: Extra price for the 4th adult.
                          child_3:
                            type: string
                            pattern: ^\d+(\.\d+)?$
                            description: Extra price for the 3rd child. Additional children follow the same pattern (child_4, child_5, etc.). Sent for OBP enabled channels.
                          child_4:
                            type: string
                            pattern: ^\d+(\.\d+)?$
                            description: Extra price for the 4th child.
                        required:
                          - ota_room_id
                          - ota_rate_id
                          - start_date
                          - end_date
              required:
                - verb
                - currency
                - Inventory
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                Success:
                  summary: Success
                  value:
                    success: true
                Failure:
                  summary: Incorrect currency settings
                  value:
                    success: false
                    errors:
                      - id: 1102
                        msg: |
                          Your currency setting doesn't match the channel's currency setting. Transmitted: EUR. Setting on OTA: USD.
              schema:
                $ref: '#/components/schemas/response_simple'
          description: ARIUpdate
      summary: ARIUpdate
      tags:
        - ARI
  /GetBookingList:
    post:
      operationId: get_booking_list
      description: |-
        Returns a list of bookings/reservations which have not been previously
        downloaded or have been modified.

        The pull interval can be freely set. For channels that do not support the
        `CreateBooking` callback the interval is usually set to pull bookings every
        5 minutes. If `CreateBooking` is supported then the `GetBookingList` will
        be used as a fallback every 30 minutes.

        The OTA can also send Cloudbeds a `NotifyBooking` callback to inform about
        new bookings available to be polled.
      requestBody:
        content:
          application/json:
            examples:
              GetBookingList:
                summary: GetBookingList
                value:
                  verb: GetBookingList
                  ota_property_id: lake_view_hotel
                  ota_property_password: very-secret-password
                  ota_property_sub_id: '10034818'
                  mya_property_id: 25678
                  guid: 6C08B96E-450D-4E6A-9933-7D0305730305
                  ota_cid: ota
                  shared_secret: s3cr3ts4uc3
                  ota_booking_version: '2022-03-22 12:09:19'
            schema:
              allOf:
                - $ref: '#/components/schemas/auth'
                - type: object
                  properties:
                    verb:
                      type: string
                      enum:
                        - GetBookingList
                    ota_booking_version:
                      type:
                        - string
                        - 'null'
                      description: |-
                        With each request we send along `ota_booking_version`, which
                        has the format `YYYY-MM-DD HH:MM:SS` and indicates the time
                        in UTC we last successfully requested bookings. It can be
                        `null` if no successful response has been received so
                        far. Please use `ota_booking_version` to only return to us
                        new or modified bookings made since then. To ensure that no
                        booking are skipped due to a time-offset between your and
                        our servers make sure to always reduce 5 or more minutes
                        from the time given. Example: we provide 2017-06-22
                        12:09:19, then please return all new/modified/cancelled
                        bookings since 2017-06-22 12:04:19 (5 minutes before the
                        time sent).

                        If `ota_booking_version` is `null` please return all bookings.
              required:
                - verb
                - ota_booking_version
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                Success:
                  summary: Success
                  value:
                    success: true
                    Bookings:
                      - booking_id: B84372-281192312
                        version: '1'
                      - booking_id: B84372-281192314
                        version: '2'
                      - booking_id: H1238-99825634
                        version: '1'
                Failure:
                  summary: Invalid credentials sent
                  value:
                    success: false
                    errors:
                      - id: 1001
                        msg: The login details you provided are incorrect.
              schema:
                oneOf:
                  - type: object
                    title: Successful booking list retrieval
                    properties:
                      success:
                        type: boolean
                        enum:
                          - true
                      Bookings:
                        type: array
                        description: |
                          List of bookings to be retrieved with `GetBookingId`.
                        items:
                          type: object
                          properties:
                            booking_id:
