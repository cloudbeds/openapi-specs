                                      items:
                                        type: integer
                                        enum:
                                          - 1
                                          - 19
                                          - 21
                                          - 22
                                    refundable:
                                      type: boolean
                                      description: If present specifies if rate plan is refundable
                                    refundable_until_days:
                                      type: integer
                                      description: |
