      operationId: 'RoomAmenityController::updateRoomAmenities'
      parameters:
        -
          name: roomId
          in: path
          description: 'The room id'
          required: true
          schema:
            type: integer
            example: 12345
        -
          name: propertyId
          in: path
          description: 'The property ID'
          required: true
          schema:
            type: integer
            example: 1
        -
          name: Accept-Language
          in: header
          description: 'RFC 5646 language preferences used for negotiation (e.g. es-ES, en;q=0.8).'
          required: false
          schema:
            type: string
            example: 'es-ES, en;q=0.8'
      requestBody:
        description: 'List of amenity codes to set for the room.'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoomAmenitiesRequestSchema'
      responses:
        '200':
          description: 'Room amenities updated successfully.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateRoomAmenitiesResponseSchema'
        '400':
          description: 'Validation error - invalid amenity codes'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestResponseSchema'
        '401':
          description: 'Unauthorized response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '403':
          description: 'Forbidden - missing required permissions'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '404':
          description: 'Property or room not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponseSchema'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
