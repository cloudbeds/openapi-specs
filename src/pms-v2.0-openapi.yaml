openapi: 3.0.0
info:
  title: 'Cloudbeds API v2'
  description: '<p>Welcome to the documentation for <strong>Cloudbeds API Version v2</strong>! If you are looking to learn how to use the Cloudbeds API to access guest information, reservations, or similar data for your Cloudbeds customers, then you''ve come to the right place.</p><p>In this document you will find all the API methods we provide along with explanations for parameters and response examples.</p><p>If you have questions about different implementation steps (e.g. how to implement OAuth 2.0), please refer to our <a href=''https://integrations.cloudbeds.com/hc/en-us''>Integrations Portal</a>.</p><p>Be sure to <a href=''https://go.pardot.com/l/308041/2018-07-24/qb2lg''>subscribe</a> to the monthly Cloudbeds API announcement mailing list to receive information on new additions and improvements to the Cloudbeds API and related developer tools.</p><p><strong>Endpoint:</strong> https://api.cloudbeds.com/{method}</p><p><strong>HTTPS:</strong> Our API requires HTTPS. We''ll respond with an appropriate error if you''re not using it.</p><p><strong>Request Format:</strong> HTTP GET, POST and PUT (Content-Type: application/x-www-form-urlencoded)</p><p><strong>Response Format:</strong> JSON</p><p><strong>Response Header:</strong> X-Request-ID is added to response headers in all calls to help accelerate support and troubleshooting.</p><p><strong><a href=''https://integrations.cloudbeds.com/hc/en-us/articles/14104678058267-API-Documentation#postman-collection''><img src=''https://run.pstmn.io/button.svg'' alt=''Run in Postman''></a></strong> use this link to access our Public collection in Postman.</p>'
  version: v2
servers:
  -
    url: 'https://api.cloudbeds.com/'
    description: 'Cloudbeds API v2'
paths:
  /addons/v1/addons:
    get:
      tags:
        - Addons
      summary: 'Retrieve property add-ons'
      description: 'Fetches list of Add-ons with basic information for a specific property'
      operationId: 'AddonController::getAddons'
      parameters:
        -
          name: x-property-id
          in: header
          description: 'A numeric, comma-separated string representing the property IDs, sent in the header.'
          required: true
          schema:
            type: string
            example: '1,2,3'
        -
          name: limit
          in: query
          description: 'The maximum number of items to return in the response. Default is 100.'
          required: false
          schema:
            type: integer
            default: 100
            maximum: 500
            minimum: 1
          example: '100'
        -
          name: offset
          in: query
          description: 'The number of items to skip before starting to collect the result set. Used for pagination.'
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          example: '0'
        -
          name: filters
          in: query
          description: 'This parameter should be formatted as a list of strings separated by ;'
          required: false
          schema:
            $ref: '#/components/schemas/QueryParameterDynamicFilterSchema'
          example: 'field1:value;field2:operator:value'
        -
          name: Accept-Language
          in: header
          description: 'The preferred language(s) for localized strings (e.g., en-US)'
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 'Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddonsResponseSchema'
        '400':
          description: 'Bad Request - Invalid input parameters'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestResponseSchema'
        '401':
          description: 'Unauthorized - Invalid or missing authentication'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '403':
          description: 'Forbidden - Insufficient permissions'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '500':
          description: 'Internal Server Error'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponseSchema'
      security:
        -
          default:
            - 'read:addon'
  /amenities/v1/catalogs/amenities:
    get:
      tags:
        - Amenities
      summary: 'Get amenity catalog'
      description: 'Returns the complete list of amenities available for the specified scope (property or room) with their translated names and category codes.'
      operationId: 'AmenityCatalogController::getAmenityCatalog'
      parameters:
        -
          name: x-property-id
          in: header
          description: 'A numeric, comma-separated string representing the property IDs, sent in the header.'
          required: true
          schema:
            type: string
            example: '1,2,3'
        -
          name: Accept-Language
          in: header
          description: 'RFC 5646 language preferences used for negotiation (e.g. es-ES, en;q=0.8).'
          required: false
          schema:
            type: string
            example: 'es-ES, en;q=0.8'
        -
          name: scope
          in: query
          description: 'The scope of amenities to retrieve'
          required: true
          schema:
            type: string
            enum:
              - property
              - room
            example: property
      responses:
        '200':
          description: 'A list of amenities in the catalog for the requested scope.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAmenityCatalogResponseSchema'
        '400':
          description: 'Invalid or missing scope parameter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestResponseSchema'
        '401':
          description: 'Unauthorized response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '403':
          description: 'Forbidden response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponseSchema'
      security:
        -
          default:
            - 'hotel:read'
  /amenities/v1/catalogs/categories:
    get:
      tags:
        - Amenities
      summary: 'Get amenity category catalog'
      description: 'Returns the complete list of amenity categories available for the specified scope (property or room) with their translated names.'
      operationId: 'AmenityCatalogController::getAmenityCategoryCatalog'
      parameters:
        -
          name: x-property-id
          in: header
          description: 'A numeric, comma-separated string representing the property IDs, sent in the header.'
          required: true
          schema:
            type: string
            example: '1,2,3'
        -
          name: Accept-Language
          in: header
          description: 'RFC 5646 language preferences used for negotiation (e.g. es-ES, en;q=0.8).'
          required: false
          schema:
            type: string
            example: 'es-ES, en;q=0.8'
        -
          name: scope
          in: query
          description: 'The scope of amenities to retrieve'
          required: true
          schema:
            type: string
            enum:
              - property
              - room
            example: property
      responses:
        '200':
          description: 'A list of amenity categories in the catalog for the requested scope.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAmenityCategoryCatalogResponseSchema'
        '400':
          description: 'Invalid or missing scope parameter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestResponseSchema'
        '401':
          description: 'Unauthorized response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '403':
          description: 'Forbidden response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponseSchema'
      security:
        -
          default:
            - 'hotel:read'
  '/amenities/v1/properties/{propertyId}/amenities':
    get:
      tags:
        - Amenities
      summary: 'Get property amenities'
      description: 'Retrieve the complete set of active property amenities.'
      operationId: 'PropertyAmenityController::getPropertyAmenities'
      parameters:
        -
          name: propertyId
          in: path
          description: 'The property ID'
          required: true
          schema:
            type: integer
            example: 1
        -
          name: Accept-Language
          in: header
          description: 'RFC 5646 language preferences used for negotiation (e.g. es-ES, en;q=0.8).'
          required: false
          schema:
            type: string
            example: 'es-ES, en;q=0.8'
      responses:
        '200':
          description: 'Property amenities retrieved successfully.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPropertyAmenitiesResponseSchema'
        '401':
          description: 'Unauthorized response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '403':
          description: 'Forbidden - missing required permissions'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '404':
          description: 'Property not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponseSchema'
      security:
        -
          default:
            - 'hotel:read'
    put:
      tags:
        - Amenities
      summary: 'Update property amenities'
      description: 'Replace the complete set of active property amenities in a single atomic transaction.'
      operationId: 'PropertyAmenityController::updatePropertyAmenities'
      parameters:
        -
          name: propertyId
          in: path
          description: 'The property ID'
          required: true
          schema:
            type: integer
            example: 1
        -
          name: Accept-Language
          in: header
          description: 'RFC 5646 language preferences used for negotiation (e.g. es-ES, en;q=0.8).'
          required: false
          schema:
            type: string
            example: 'es-ES, en;q=0.8'
      requestBody:
        description: 'List of amenity codes to set for the property.'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePropertyAmenitiesRequestSchema'
      responses:
        '200':
          description: 'Property amenities updated successfully.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePropertyAmenitiesResponseSchema'
        '400':
          description: 'Validation error - invalid amenity codes'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestResponseSchema'
        '401':
          description: 'Unauthorized response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '403':
          description: 'Forbidden - missing required permissions'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '404':
          description: 'Property not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponseSchema'
      security:
        -
          default:
            - 'hotel:write'
  '/amenities/v1/properties/{propertyId}/room-amenities':
    get:
      tags:
        - Amenities
      summary: 'Get amenities for all rooms in a property'
      description: 'Retrieve the complete set of active amenities for all rooms in a property.'
      operationId: 'RoomAmenityController::getPropertyRoomsAmenities'
      parameters:
        -
          name: propertyId
          in: path
          description: 'The property ID'
          required: true
          schema:
            type: integer
            example: 1
        -
          name: Accept-Language
          in: header
          description: 'RFC 5646 language preferences used for negotiation (e.g. es-ES, en;q=0.8).'
          required: false
          schema:
            type: string
            example: 'es-ES, en;q=0.8'
      responses:
        '200':
          description: 'Room amenities retrieved successfully.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPropertyRoomsAmenitiesResponseSchema'
        '401':
          description: 'Unauthorized response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '403':
          description: 'Forbidden - missing required permissions'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '404':
          description: 'Property not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponseSchema'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponseSchema'
      security:
        -
          default:
            - 'hotel:read'
    put:
      tags:
        - Amenities
      summary: 'Update amenities for multiple rooms'
      description: 'Replace the complete set of active amenities for multiple rooms in a single atomic transaction.'
      operationId: 'RoomAmenityController::updatePropertyRoomsAmenities'
      parameters:
        -
          name: propertyId
          in: path
          description: 'The property ID'
          required: true
          schema:
            type: integer
            example: 1
        -
          name: Accept-Language
          in: header
          description: 'RFC 5646 language preferences used for negotiation (e.g. es-ES, en;q=0.8).'
          required: false
          schema:
            type: string
            example: 'es-ES, en;q=0.8'
      requestBody:
        description: 'List of rooms with amenity codes to set.'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePropertyRoomsAmenitiesRequestSchema'
      responses:
        '200':
          description: 'Room amenities updated successfully.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePropertyRoomsAmenitiesResponseSchema'
        '400':
          description: 'Validation error - invalid amenity codes or room IDs'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestResponseSchema'
        '401':
          description: 'Unauthorized response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '403':
          description: 'Forbidden - missing required permissions'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponseSchema'
        '404':
          description: 'Property or room not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponseSchema'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponseSchema'
      security:
        -
          default:
            - 'hotel:write'
  '/amenities/v1/properties/{propertyId}/rooms/{roomId}/amenities':
    get:
      tags:
        - Amenities
      summary: 'Get room amenities'
      description: 'Retrieve the complete set of active room amenities.'
      operationId: 'RoomAmenityController::getRoomAmenities'
      parameters:
        -
          name: roomId
          in: path
          description: 'The room id'
          required: true
          schema:
            type: integer
            example: 12345
        -
          name: propertyId
          in: path
          description: 'The property ID'
          required: true
          schema:
            type: integer
            example: 1
        -
          name: Accept-Language
          in: header
          description: 'RFC 5646 language preferences used for negotiation (e.g. es-ES, en;q=0.8).'
          required: false
          schema:
            type: string
