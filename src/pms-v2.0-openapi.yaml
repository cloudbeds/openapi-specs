    EventCreateRequestSchema:
      description: 'Request body for creating a new event'
      required:
        - name
        - sourceId
      properties:
        name:
          description: 'Event name'
          type: string
          maxLength: 255
          example: 'Smith Wedding Reception'
        profileId:
          description: 'GPS Profile ID to link to this event'
          type: string
          example: '987123456489'
          nullable: true
        status:
          description: 'Event status (default: lead)'
          type: string
          enum:
            - lead
            - proposal
            - tentative
            - qualified
            - definite
            - open
            - closed
            - closed_lost
            - canceled
          example: lead
        sourceId:
          description: 'Source ID for the event booking source'
          type: string
          example: ss-123456
        startDate:
          description: 'Event start date (YYYY-MM-DD). NOTE: Informational only - effective event dates are calculated from linked reservations.'
          type: string
          example: '2025-06-15'
          nullable: true
        endDate:
          description: 'Event end date (YYYY-MM-DD). NOTE: Informational only - effective event dates are calculated from linked reservations.'
          type: string
          example: '2025-06-17'
          nullable: true
        transactionMode:
          description: 'Transaction routing mode (default: none)'
          type: string
          enum:
            - none
            - post_into_group
          example: none
        transactionTypes:
          description: 'Transaction types to route (required when transactionMode is post_into_group)'
          type: array
          items:
            type: string
          example:
            - accommodation
            - products
          nullable: true
        folioConfigId:
          description: 'Folio configuration ID'
          type: string
          example: '456'
          nullable: true
        enableAggregateAllotmentBlock:
          description: 'Enable aggregate allotment block feature'
          type: boolean
          example: false
        aggregateAllotmentBlockPackageId:
          description: 'Package ID for aggregate allotment block'
          type: string
          example: '123'
          nullable: true
        segmentId:
          description: 'Market segment ID'
          type: string
          example: '5'
          nullable: true
      type: object
    EventGetRequestSchema:
      description: 'Request schema for getting a single event.'
      required:
