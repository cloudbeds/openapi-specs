          type: string
          example: '2025-01-01T00:00:00Z'
          nullable: true
        createdTo:
          description: 'Filter events created before this datetime (RFC 3339 format)'
          type: string
          example: '2025-12-31T23:59:59Z'
          nullable: true
        startDateFrom:
          description: 'Filter events where startDate is on or after this date (YYYY-MM-DD format)'
          type: string
          example: '2025-01-01'
          nullable: true
        startDateTo:
          description: 'Filter events where startDate is on or before this date (YYYY-MM-DD format)'
          type: string
          example: '2025-12-31'
          nullable: true
        endDateFrom:
          description: 'Filter events where endDate is on or after this date (YYYY-MM-DD format)'
          type: string
          example: '2025-01-01'
          nullable: true
        endDateTo:
          description: 'Filter events where endDate is on or before this date (YYYY-MM-DD format)'
          type: string
          example: '2025-12-31'
          nullable: true
        limit:
          description: 'Maximum number of items to return (default: 100, max: 100)'
