            -
              type: string
              format: date
              example: '2023-10-19'
            -
              type: integer
              example: 42
            -
              type: boolean
              example: true
            -
              type: array
              items:
                type: string
              example:
                - cancelled
                - disabled
            -
              type: array
              items:
                type: integer
              example:
                - 1
                - 2
                - 3
            -
              type: array
              items:
                type: string
                format: date
              example:
                - '2023-10-19'
                - '2023-10-20'
            -
              type: array
              items:
                type: string
                format: date-time
              example:
                - '2023-10-19T00:00:01'
                - '2023-10-19T23:59:09'
      type: object
    DynamicFilterSchema:
      description: 'Represents a logical group of filters with keys like ''and'' or ''or'''
      properties:
        and:
          description: 'Logical operator grouping filters or nested logical groups'
          type: array
          items:
            oneOf:
              -
                $ref: '#/components/schemas/DynamicFilterFieldSchema'
              -
                $ref: '#/components/schemas/DynamicFilterSchema'
        or:
