          description: 'Tax/fee configuration for this addon'
          type: array
          items:
            $ref: '#/components/schemas/TaxFeeConfigSchema'
        isDefault:
          description: 'Whether this is a default (package) add-on'
          type: boolean
          example: false
      type: object
    CalculateTotalsRequestSchema:
      required:
        - type
        - taxesAndFees
      properties:
        type:
          description: 'Entity type. Determines the calculation strategy.'
          type: string
          enum:
            - reservation
            - product
            - addon
            - custom_item
            - resource
            - room_revenue
            - adjustment
            - manual_tax_fee
          example: product
        taxesAndFees:
          description: 'Array of tax/fee configuration objects. Can be empty.'
          type: array
          items:
            $ref: '#/components/schemas/TaxFeeConfigSchema'
        convenienceFeeConfig:
          oneOf:
            -
              $ref: '#/components/schemas/ConvenienceFeeConfigSchema'
          nullable: true
          description: 'Convenience fee configuration'
        date:
          description: 'Calculation date (YYYY-MM-DD). Used for context and monitoring. Defaults to current date.'
          type: string
          example: '2026-04-01'
          nullable: true
        roundingMethod:
          description: 'Rounding method. 0 = legacy (default), 1 = item-level rounding.'
          type: integer
          example: 0
          nullable: true
        exclusiveTaxesOnTotal:
          description: 'Whether exclusive taxes are calculated on the net rate (after inclusive extraction). Defaults to true.'
          type: boolean
          example: true
        amount:
          oneOf:
            -
              $ref: '#/components/schemas/MoneyInputSchema'
          nullable: true
          description: 'Base amount for entity types. Required for product/addon/custom_item/resource.'
        adults:
          description: 'Number of adults. Used by fixed_per_person. Defaults to 1.'
          type: integer
          example: 1
        children:
          description: 'Number of children. Used by fixed_per_person. Defaults to 0.'
          type: integer
          example: 0
        nights:
          description: 'Number of nights. Used by fixed_per_person, fixed_per_accommodation. Defaults to 1.'
          type: integer
          example: 1
        accommodations:
          description: 'Number of accommodations. Used by fixed_per_accommodation. Defaults to 1.'
          type: integer
          example: 1
        rooms:
          description: 'Room configurations. Required for reservation type. Must be null (not empty array) for entity types.'
          type: array
          items:
            $ref: '#/components/schemas/RoomSchema'
          nullable: true
        currencyCode:
          description: 'ISO 4217 currency code. Required for reservation type. For entity types, derived from amount.currencyCode.'
          type: string
          example: USD
          nullable: true
        depositConfig:
          oneOf:
            -
              $ref: '#/components/schemas/DepositConfigSchema'
          nullable: true
          description: 'Deposit calculation rules. Reservation type only.'
        allotmentBlockCode:
          description: 'Allotment block code. Reservation type only.'
          type: string
          nullable: true
      type: object
    ConvenienceFeeConfigSchema:
      required:
        - name
        - rate
        - rateType
        - mode
      properties:
        name:
          description: 'Display name for the surcharge'
          type: string
          example: 'Credit Card Surcharge'
        rate:
          description: 'Fee rate in minor units. For percentage: the rate in minor units (e.g., "300" = 3.00%).'
          type: string
          example: '300'
        rateType:
          description: 'How the fee is calculated'
          type: string
          enum:
            - percentage
            - fixed
          example: percentage
        mode:
          description: 'Calculation mode. fee_on_top = added to total. fee_from_total = extracted from total.'
          type: string
          enum:
            - fee_on_top
            - fee_from_total
          example: fee_on_top
      type: object
    DateRangeSchema:
      required:
        - range
      properties:
        range:
          description: 'Date range in "start/end" format. Dates can be full (YYYY-MM-DD) or recurring annual (--MM-DD). End date can be omitted for open-ended ranges.'
          type: string
          example: 2026-03-01/2026-03-31
        amount:
          description: 'Override tax/fee amount when this date range matches, in minor currency units (e.g. 1500 = $15.00).'
          type: string
          example: '1500'
          nullable: true
        amountAdult:
          description: 'Override per-adult amount in minor currency units (e.g. 500 = $5.00).'
          type: string
          example: '500'
          nullable: true
        amountChild:
          description: 'Override per-child amount in minor currency units (e.g. 250 = $2.50).'
          type: string
          example: '250'
          nullable: true
        amountRateBased:
          description: 'Override rate-based tiers.'
          type: array
          items:
            $ref: '#/components/schemas/RateBasedTierSchema'
          nullable: true
        maxLength:
          description: 'Override max nights to charge.'
          type: integer
          example: 10
          nullable: true
        lengthOfStay:
          oneOf:
            -
              $ref: '#/components/schemas/LengthOfStaySchema'
          nullable: true
          description: 'Nested length-of-stay rules that apply within this date range.'
      type: object
    DepositConfigSchema:
      required:
        - type
      properties:
        type:
          description: 'How deposit is calculated'
          type: string
          enum:
            - percentage
            - fixed
            - first_night
            - first_night_with_taxes
            - full_stay
            - none
          example: percentage
        value:
          description: 'Deposit value in minor currency units. Required for percentage and fixed types. For percentage: "5000" = 50.00%. For fixed: "5000" = $50.00.'
          type: string
          example: '5000'
          nullable: true
      type: object
    DetailedRateSchema:
      required:
        - date
        - rate
      properties:
        date:
          description: 'Night date (YYYY-MM-DD)'
          type: string
          example: '2026-04-01'
        rate:
          description: 'Base room rate for this night in minor currency units (e.g. 15000 = $150.00)'
          type: string
          example: '15000'
        adults:
          description: 'Adult surcharge for this night in minor currency units (e.g. 2500 = $25.00)'
          type: string
          example: '2500'
        children:
          description: 'Child surcharge for this night in minor currency units (e.g. 1000 = $10.00)'
          type: string
          example: '1000'
      type: object
    LengthOfStayRangeSchema:
      required:
        - minimumNights
      properties:
        minimumNights:
          description: 'Minimum nights for this range to apply (inclusive).'
          type: integer
          example: 1
        maximumNights:
          description: 'Maximum nights for this range (inclusive). Null means no upper limit.'
          type: integer
          example: 28
          nullable: true
        amount:
          description: 'Override tax/fee amount for this range, in minor currency units (e.g. 1000 = $10.00).'
          type: string
          example: '1000'
          nullable: true
        amountAdult:
          description: 'Override per-adult amount for this range, in minor currency units (e.g. 500 = $5.00).'
          type: string
          example: '500'
          nullable: true
        amountChild:
          description: 'Override per-child amount for this range, in minor currency units (e.g. 250 = $2.50).'
          type: string
          example: '250'
          nullable: true
        amountRateBased:
          description: 'Override rate-based tiers for this range.'
          type: array
          items:
            $ref: '#/components/schemas/RateBasedTierSchema'
          nullable: true
        maxLength:
          description: 'Override max nights to charge for per-person taxes.'
          type: integer
          example: 10
          nullable: true
      type: object
    LengthOfStaySchema:
      required:
        - applicationType
        - ranges
      properties:
        applicationType:
          description: 'How length-of-stay rules are applied. "progressive_application" applies per-night based on which night it is. "retroactive_adjustment" applies uniformly based on total stay length.'
          type: string
          enum:
            - progressive_application
            - retroactive_adjustment
          example: progressive_application
        ranges:
          description: 'Length-of-stay ranges. Each range defines amount overrides for a night count bracket.'
          type: array
          items:
            $ref: '#/components/schemas/LengthOfStayRangeSchema'
      type: object
    MoneyInputSchema:
      required:
        - amount
        - currencyCode
      properties:
        amount:
          description: 'Amount in the smallest representable units of the currency (e.g., cents for USD)'
          type: string
          example: '10000'
        currencyCode:
          description: 'ISO 4217 currency code'
          type: string
          example: USD
      type: object
    RateBasedTierSchema:
      required:
        - rate
        - percentage
      properties:
        rate:
          description: 'Rate threshold in minor currency units. Tax tier applies when the base rate is >= this value (e.g. 15000 = $150.00).'
          type: string
          example: '0'
        percentage:
          description: 'Tax percentage to apply when the rate threshold is met, in minor units (e.g. 1000 = 10.00%).'
          type: string
          example: '1000'
      type: object
    RoomSchema:
      required:
        - startDate
        - endDate
        - adults
        - children
        - detailedRates
      properties:
        roomTypeId:
          description: 'Room type ID for per-room-type tax filtering'
          type: string
          example: '101'
          nullable: true
        startDate:
          description: 'Check-in date (YYYY-MM-DD)'
          type: string
          example: '2026-04-01'
        endDate:
          description: 'Check-out date (YYYY-MM-DD)'
          type: string
          example: '2026-04-03'
        adults:
          description: 'Number of adults (>= 1)'
          type: integer
          example: 2
        children:
          description: 'Number of children (>= 0)'
          type: integer
          example: 1
        rateId:
          description: 'Rate plan ID (context only)'
          type: string
          example: '456'
          nullable: true
        detailedRates:
          description: 'Per-night rate breakdown. One entry per night of the stay.'
          type: array
          items:
            $ref: '#/components/schemas/DetailedRateSchema'
        addons:
          description: 'Add-ons to include in calculation'
          type: array
          items:
            $ref: '#/components/schemas/AddonSchema'
          nullable: true
      type: object
    TaxFeeConfigSchema:
      required:
        - id
        - name
        - category
        - calculationType
        - value
        - taxTreatment
      properties:
        id:
          description: 'Unique identifier within the request'
          type: string
          example: '101'
        name:
          description: 'Display name'
          type: string
          example: 'VAT 10%'
        category:
          description: 'Whether this is a tax or a fee'
          type: string
          enum:
            - tax
            - fee
          example: tax
        calculationType:
          description: 'How the amount is calculated'
          type: string
          enum:
            - percentage
            - percentage_rate_based
            - fixed
            - fixed_per_person
            - fixed_per_accomodation
            - fixed_per_reservation
          example: percentage
        value:
          description: 'Rate or amount value in minor units. For percentage types: the percentage in minor units (e.g., "1000" = 10.00%). For fixed types: the amount in minor currency units (e.g., "1500" = $15.00).'
          type: string
          example: '1000'
        taxTreatment:
          description: 'How this tax/fee relates to the base amount'
          type: string
          enum:
            - inclusive
            - exclusive
          example: exclusive
        parentId:
          description: 'References another item ID for tax-on-fee or tax-on-tax'
          type: string
          nullable: true
        parentKind:
          description: 'Type of parent'
          type: string
          enum:
            - tax
            - fee
          nullable: true
        roomTypeIds:
          description: 'Room type IDs this tax/fee applies to. Empty means all room types.'
          type: array
          items:
            type: string
          nullable: true
        typeSettings:
          oneOf:
            -
              $ref: '#/components/schemas/TypeSettingsSchema'
          nullable: true
          description: 'Additional type settings (length-of-stay rules, date ranges, per-person amounts, rate-based tiers).'
      type: object
    TypeSettingsSchema:
      description: "Additional type settings for tax/fee calculation.\nAll properties are optional — only provide what applies to the specific tax/fee."
      properties:
        amountAdult:
          description: 'Per-adult fixed amount in minor currency units (e.g. 1000 = $10.00). Used with fixed_per_person calculation type when adults and children have different rates.'
          type: string
          example: '1000'
          nullable: true
        amountChild:
          description: 'Per-child fixed amount in minor currency units (e.g. 500 = $5.00). Used with fixed_per_person calculation type when adults and children have different rates.'
          type: string
          example: '500'
          nullable: true
        amountRateBased:
          description: 'Rate-based percentage tiers. Required for percentage_rate_based calculation type. Each tier defines a rate threshold and the tax percentage to apply when the base rate meets it.'
          type: array
          items:
            $ref: '#/components/schemas/RateBasedTierSchema'
          nullable: true
        maxLength:
          description: 'Maximum number of nights to charge for per-person taxes. When set, per-person taxes stop accruing after this many nights per guest.'
          type: integer
          example: 28
          nullable: true
        dateRanges:
          description: 'Date ranges with amount overrides. When present, the tax/fee only applies on nights that fall within a matching range, using the range''s overridden amounts. If no range matches a given night, the tax/fee is excluded for that night.'
          type: array
          items:
            $ref: '#/components/schemas/DateRangeSchema'
          nullable: true
        lengthOfStay:
          oneOf:
            -
              $ref: '#/components/schemas/LengthOfStaySchema'
          nullable: true
          description: 'Length-of-stay rules that override amounts based on the number of nights.'
      type: object
    CalculateTotalsResponseSchema:
      required:
        - type
        - netAmount
        - subtotal
        - inclusiveTaxesAndFees
        - exclusiveTaxesAndFees
        - taxes
        - fees
        - total
        - paymentTotal
        - currencyCode
      properties:
        type:
          description: 'Echoed from request'
          type: string
          example: reservation
        netAmount:
          $ref: '#/components/schemas/MoneySchema'
        subtotal:
          $ref: '#/components/schemas/MoneySchema'
        inclusiveTaxesAndFees:
          $ref: '#/components/schemas/MoneySchema'
        exclusiveTaxesAndFees:
          $ref: '#/components/schemas/MoneySchema'
        taxes:
          $ref: '#/components/schemas/TaxFeeBreakdownResponseSchema'
        fees:
          $ref: '#/components/schemas/TaxFeeBreakdownResponseSchema'
        total:
          $ref: '#/components/schemas/MoneySchema'
        convenienceFee:
          oneOf:
            -
              $ref: '#/components/schemas/ConvenienceFeeResponseSchema'
          nullable: true
          description: 'Convenience fee details'
        paymentTotal:
          $ref: '#/components/schemas/MoneySchema'
        currencyCode:
          description: 'ISO 4217 currency code'
          type: string
          example: USD
        deposit:
          oneOf:
            -
              $ref: '#/components/schemas/MoneySchema'
          nullable: true
          description: 'Calculated deposit amount. Reservation only.'
        balanceDue:
          oneOf:
            -
              $ref: '#/components/schemas/MoneySchema'
          nullable: true
          description: 'total - deposit. Reservation only.'
        defaultAddonsTotal:
          oneOf:
            -
              $ref: '#/components/schemas/MoneySchema'
          nullable: true
          description: 'Total of default (package) add-ons. Reservation only.'
        requestedAddonsTotal:
          oneOf:
            -
              $ref: '#/components/schemas/MoneySchema'
          nullable: true
          description: 'Total of explicitly requested add-ons. Reservation only.'
        rooms:
          description: 'Per-room totals breakdown. Reservation only.'
          type: array
          items:
            $ref: '#/components/schemas/RoomTotalsResponseSchema'
          nullable: true
      type: object
    ConvenienceFeeResponseSchema:
      required:
        - name
        - amount
        - rate
        - rateType
        - mode
      properties:
        name:
          description: 'Display name (echoed)'
          type: string
          example: 'Credit Card Surcharge'
        amount:
          $ref: '#/components/schemas/MoneySchema'
        rate:
          description: 'Fee rate (echoed)'
          type: string
          example: '3.00'
        rateType:
          description: 'How calculated (echoed)'
          type: string
          enum:
            - percentage
            - fixed
          example: percentage
        mode:
          description: 'Mode used (echoed)'
          type: string
          enum:
            - fee_on_top
            - fee_from_total
          example: fee_on_top
      type: object
    RoomTotalsResponseSchema:
      required:
        - totalWithoutTaxes
        - totalFirstNightWithoutTaxes
        - taxesAndFees
        - taxesAndFeesFirstNight
      properties:
        totalWithoutTaxes:
          $ref: '#/components/schemas/MoneySchema'
        totalFirstNightWithoutTaxes:
          $ref: '#/components/schemas/MoneySchema'
        taxesAndFees:
          $ref: '#/components/schemas/MoneySchema'
        taxesAndFeesFirstNight:
          $ref: '#/components/schemas/MoneySchema'
      type: object
    TaxFeeBreakdownResponseSchema:
      required:
        - total
        - items
      properties:
        total:
          $ref: '#/components/schemas/MoneySchema'
        items:
          description: 'Individual line items'
          type: array
          items:
            $ref: '#/components/schemas/TaxFeeItemResponseSchema'
      type: object
    TaxFeeItemResponseSchema:
      required:
        - id
        - name
        - amount
        - taxTreatment
      properties:
        id:
          description: 'Tax/fee ID (echoed)'
          type: string
          example: '101'
        name:
          description: 'Display name (echoed)'
          type: string
          example: 'VAT 10%'
        amount:
          $ref: '#/components/schemas/MoneySchema'
        taxTreatment:
          description: 'Tax treatment (echoed)'
          type: string
          enum:
            - inclusive
            - exclusive
          example: exclusive
        parentId:
          description: 'Parent ID (echoed, if present)'
          type: string
          nullable: true
        parentKind:
          description: 'Parent type (echoed)'
          type: string
          enum:
            - tax
            - fee
          nullable: true
      type: object
  parameters:
    roomId:
      name: roomId
      in: path
      description: 'Room ID'
      required: true
      schema:
        type: string
      example: 1-b
  securitySchemes:
    api_key:
      type: apiKey
      name: x-api-key
      in: header
    default:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: 'https://api.cloudbeds.com/auth/oauth/authorize'
          tokenUrl: 'https://api.cloudbeds.com/auth/oauth/token'
          scopes:
            'read:addon': 'Read Addon information'
            'read:doorLockKey': 'Read DoorLock keys and settings'
            'write:doorLockKey': 'Write DoorLock keys and settings'
            'delete:doorLockKey': 'Delete DoorLock keys and settings'
            'read:housekeeping': 'Read Housekeeping inspections'
            'read:marketsegment': 'Read Market Segmentation groups and segments'
            'write:marketsegment': 'Write Market Segmentation groups and segments'
            'delete:marketsegment': 'Delete Market Segmentation groups and segments'
            'write:importTask': 'Create new data imports'
            'read:importTask': 'Read data imports'
            'hotel:read': 'Read Hotel information'
            'hotel:write': 'Write Hotel information'
            'hotel:delete': 'Delete Hotel information'
            'write:appError': 'Write AppError information'
            'read:agePolicy': 'Read Age Policy information'
            'write:agePolicy': 'Write Age Policy information'
            'delete:agePolicy': 'Delete Age Policy information'
            'write:allotmentBlocks': 'Write AllotmentBlock information'
            'read:allotmentBlocks': 'Read AllotmentBlock information'
            'delete:allotmentBlocks': 'Delete AllotmentBlock information'
