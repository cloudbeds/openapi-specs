components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    propertyIdHeader:
      name: X-Property-ID
      in: header
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: Property id
    acceptLanguageHeader:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
      description: Desired language of exported PDF
    fiscalDocumentId:
      name: id
      in: path
      required: true
      description: Unique ID of the fiscal document to download.
      schema:
        type: string
        minLength: 1
  responses:
    400:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    403:
      description: Access denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  schemas:
    AnyValue:
      description: 'Can be any of supported OpenApi types.'
    FiscalDocumentEmailRequest:
      type: object
      required:
        - emails
      properties:
        emails:
          type: array
          items:
            type: string
            format: email
          maxItems: 10
          minItems: 1
    CreateCreditNoteRequest:
      type: object
      required: [invoiceId, method]
      properties:
        sequenceId:
          type: integer
          format: int64
          minimum: 1
          nullable: true
        invoiceId:
          type: integer
          format: int64
          minimum: 1
