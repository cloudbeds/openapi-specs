  "/fiscal-document/v1/fiscal-documents/{advance_invoice_id}/settlement":
    post:
      summary: Create a settlement invoice for an advance invoice
      description: |
        Create a settlement invoice linked to an existing advance invoice.

        A settlement invoice finalizes the billing cycle started by an advance invoice.
        It references the advance invoice and may include additional transactions
        that were not part of the original advance.

        **Validation Rules:**
        - The parent document must be an ADVANCE_INVOICE
        - The parent document must be in an active status
        - There must not already be an active settlement invoice for this advance
      operationId: createSettlementInvoice
      security:
        - bearerAuth: []
      tags:
        - Fiscal Documents
      parameters:
        - $ref: "#/components/parameters/propertyIdHeader"
        - name: advance_invoice_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
          description: The ID of the advance invoice to settle
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateSettlementInvoiceRequest"
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/FiscalDocumentSummaryResponse"
