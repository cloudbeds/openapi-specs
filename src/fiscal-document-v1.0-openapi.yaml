      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/propertyIdHeader"
        - name: id
          in: path
          description: Invoice ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceAllocationsResponse"
        '400':
          description: Bad Request - Invalid request (document is not an invoice or invalid ID format)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ApiError"
        '404':
          description: Bad Request - Invoice not found
          content:
