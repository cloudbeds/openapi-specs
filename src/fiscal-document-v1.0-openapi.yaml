          example: "BR"
        name:
          type: string
          description: Country name
          example: "Brazil"
    FieldDefinition:
      type: object
      required:
        - path
        - label
        - type
        - required
      properties:
        path:
          type: string
          description: Field path (e.g., "name", "tax_id.code", "addresses")
          example: "name"
        label:
          type: string
          description: Display label for the field
          example: "Legal Name"
        type:
          type: string
          enum: [text, email, select, boolean, array, object]
          description: Field input type
        category:
          type: string
          enum: [company, tax, address, contact, supplementary, custom]
          description: Field grouping category
        required:
          type: boolean
          description: Whether field is required
        primary:
          type: boolean
          description: Indicates primary tax ID field
          default: false
        validation:
          $ref: '#/components/schemas/FieldValidation'
        data:
          $ref: '#/components/schemas/FieldData'
        options:
          type: array
          items:
            $ref: '#/components/schemas/SelectOption'
        item:
          $ref: '#/components/schemas/ArrayItemDefinition'
        properties:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/FieldDefinition'
          description: Object properties for object type fields
        default:
          oneOf:
            - type: string
            - type: boolean
            - type: number
        description:
          type: string
          description: Field description
    SelectOption:
      type: object
      required:
        - value
        - label
      properties:
        value:
          type: string
        label:
          type: string
    FieldValidation:
      type: object
      properties:
        pattern:
          type: string
          description: Regex pattern for validation
        min:
          type: integer
          description: Minimum length or items
        max:
          type: integer
          description: Maximum length
        checksum:
          type: boolean
          description: Whether field has checksum validation
        format:
          type: string
          description: Display format mask (e.g., XX.XXX.XXX/XXXX-XX)
    FieldData:
      type: object
      properties:
        placeholder:
          type: string
          description: Input placeholder text
        help:
          type: string
          description: Help text for the field
        alternatives:
          type: array
          items:
            type: string
          description: Alternative accepted formats (e.g., CPF for CNPJ fields)
    ArrayItemDefinition:
      type: object
      required:
        - type
        - fields
      properties:
        type:
          type: string
          enum: [object]
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FieldDefinition'
    FiscalizationValidationResult:
      type: object
      required:
        - valid
      properties:
        valid:
          type: boolean
          description: Whether the data is valid
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
    ValidationError:
      type: object
      required:
        - field
        - code
        - message
      properties:
        field:
          type: string
          description: Field path that has the error
        code:
          type: string
          description: Error code (e.g., "REQUIRED", "INVALID_FORMAT")
        message:
          type: string
          description: Human-readable error message
    FiscalizationCountryOption:
      type: object
      required:
        - code
        - name
      properties:
        code:
          type: string
          description: ISO 3166-1 alpha-2 country code
        name:
          type: string
          description: Country name
    FiscalizationRegistrationStatus:
      type: object
      required:
        - countryCode
        - status
      properties:
        countryCode:
          type: string
          description: ISO 3166-1 alpha-2 country code
        status:
          type: string
          enum:
            - NOT_REGISTERED
            - PENDING
            - AWAITING
            - REGISTERED
            - FAILED
          description: Registration status with government systems
        providerId:
          type: string
          description: Provider-specific registration ID
        linkUrl:
          type: string
          description: External link URL when status is AWAITING (e.g., government portal)
        createdAt:
          type: string
          format: date-time
          description: When registration was created
        updatedAt:
          type: string
          format: date-time
          description: When status was last updated
        error:
          type: string
          description: Error if registration failed
    FiscalizationProviderInfo:
      type: object
      required:
        - providerName
        - countryCode
      properties:
        providerName:
          type: string
          description: Name of the fiscalization provider (e.g., Invopop, Fonoa, Fiskaly)
        countryCode:
          type: string
          description: ISO 3166-1 alpha-2 country code
        countryName:
          type: string
          description: Human-readable country name
    FiscalizationConsentRequest:
      type: object
      required:
        - consentedBy
      properties:
        consentedBy:
          type: string
          description: Identifier of the user who provided consent (e.g., email or user ID)
    FiscalizationConsentResponse:
      type: object
      required:
        - consented
      properties:
        consented:
          type: boolean
          description: Whether the property has provided consent
        consentedAt:
          type: string
          format: date-time
          description: When consent was provided
        consentedBy:
          type: string
          description: Who provided consent
    FiscalizationTaxRulesResponse:
      type: object
      required:
        - country
        - taxes
      properties:
        country:
          $ref: '#/components/schemas/CountryInfo'
        taxes:
          type: array
          items:
            $ref: '#/components/schemas/TaxRule'
          description: Flat list of selectable tax category + rate combinations
    TaxRule:
      type: object
      required:
        - category
        - key
        - rate
        - name
      properties:
        category:
          type: string
          description: Tax category code (e.g., VAT, ISR)
        key:
          type: string
          description: Tax key describing the tax situation (e.g., standard, exempt)
        rate:
          type: string
          description: Rate within the category and key (e.g., general, reduced)
        name:
          type: string
          description: Display name (e.g., "VAT - General Rate (16.0%)")
        percent:
          type: string
          description: Rate percentage (e.g., "16.0%")
    FiscalizationTaxResponse:
      type: object
      properties:
        taxes:
          type: array
          items:
            $ref: '#/components/schemas/TaxMapping'
    FiscalizationTaxRequest:
      type: object
      properties:
        taxes:
          type: array
          items:
            $ref: '#/components/schemas/TaxMapping'
    TaxMapping:
      type: object
      required:
        - taxId
        - category
        - key
        - rate
      properties:
        taxId:
          type: integer
          format: int64
          description: Tax ID from the accounting system
        category:
          type: string
          description: Tax category code (e.g., VAT, ISR)
        key:
          type: string
          description: Tax key describing the tax situation (e.g., standard, exempt)
        rate:
          type: string
          description: Rate within the category and key (e.g., general, reduced)
