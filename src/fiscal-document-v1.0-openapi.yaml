    # Clean provider-agnostic models
    FiscalizationRegistrationRequest:
      type: object
      description: Provider-agnostic supplier registration data
      required:
        - country
        - name
      properties:
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          pattern: "^[A-Z]{2}$"
          example: "IT"
        name:
          type: string
          description: Legal name of the company
          example: "Mario Rossi Albergo"
        taxId:
          type: string
          description: Primary tax identification number
          example: "98765432103"
        addresses:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/FiscalizationAddress'
        emails:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/FiscalizationEmail'
        phones:
          type: array
          items:
            $ref: '#/components/schemas/FiscalizationPhone'
        identities:
          type: object
          description: Additional tax/legal identities (key-value pairs)
          additionalProperties:
            type: string
          example:
            "it-fiscal-code": "98765432103"
        extensions:
          type: object
          description: Country-specific tax configuration
          additionalProperties:
            type: string
          example:
            "it-regime-fiscale": "RF07"
            "it-sdi-format": "FPR12"
    FiscalizationAddress:
      type: object
      required:
        - street
        - postalCode
        - country
      properties:
        street:
          type: string
          description: Street address with number
          example: "Via Roma 123"
        number:
          type: string
          description: Street number (separate field for countries like Brazil)
          example: "123"
        locality:
          type: string
          description: Neighborhood or locality
          example: "Centro"
        region:
          type: string
          description: City, region, or administrative area
          example: "Milan"
        state:
          type: string
          description: State/Province/Region code
          example: "MI"
        postalCode:
          type: string
          description: Postal/ZIP code
          example: "20121"
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          pattern: "^[A-Z]{2}$"
          example: "IT"
    FiscalizationEmail:
      type: object
      required:
        - address
      properties:
        address:
          type: string
          format: email
          description: Email address
          example: "fatture@hotel-italia.it"
        label:
          type: string
          description: Optional label for the email
          example: "Invoicing"
    FiscalizationPhone:
      type: object
      required:
        - number
      properties:
        number:
          type: string
          description: Phone number (international format preferred)
          example: "+39 02 1234567"
        label:
          type: string
          description: Optional label for the phone
          example: "Office"
    FiscalizationRegistrationResponse:
      allOf:
        - $ref: '#/components/schemas/FiscalizationRegistrationRequest'
        - type: object
          required:
            - propertyId
            - status
          properties:
            propertyId:
              type: integer
              format: int64
              description: Property ID this registration belongs to
            status:
              $ref: '#/components/schemas/FiscalizationRegistrationStatus'
              description: Registration status with government systems
            providerId:
              type: string
              description: Provider-specific ID (e.g., Invopop party ID)
            isDefault:
              type: boolean
              description: Whether this is the default fiscalization registration
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    FiscalizationListResponse:
      type: object
