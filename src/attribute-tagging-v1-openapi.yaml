openapi: 3.0.3
info:
  title: Attribute Tagging Service API
  description: |-
    API for managing attribute tagging functionality in Cloudbeds.

    Public API base path: `/attribute-tagging/v1`

    Download OpenAPI specification: [JSON](https://api.cloudbeds.com/attribute-tagging/v1/docs/json) | [YAML](https://api.cloudbeds.com/attribute-tagging/v1/docs/yaml)
  version: v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Enter your JWT token (without the word "Bearer")
  schemas: {}
paths:
  /attributes/:
    get:
      summary: Returns a list of attributes
      tags:
        - Attributes
      parameters:
        - schema:
            type: string
          in: query
          name: filters
          required: false
          description: |-
            Filter format: `field:operator:value`, multiple filters separated by semicolons.

            Supported fields:
            - `entityTypes:in:` - a comma-separated list of values: `guest`, `reservation`

            Examples:
            - `entityTypes:in:guest,reservation`
        - schema:
            type: string
          in: query
          name: sort
          required: false
          description: |-
            Sort format: `field[:direction]`

            Valid fields: `label`, `createdAt`, `updatedAt`

            Valid directions: `asc`, `desc` (defaults to `asc` when omitted)

            Default: unsorted
        - schema:
            type: string
          in: header
          name: x-organization-id
          required: true
          description: Organization ID
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      pattern: ^\d+$
                    label:
                      type: string
                      minLength: 1
                    description:
                      nullable: true
                      type: string
                    entityTypes:
                      type: array
                      items:
                        type: string
                        enum:
                          - guest
                          - reservation
                    isEnabled:
                      type: boolean
                  required:
                    - id
                    - label
                    - description
                    - entityTypes
                    - isEnabled
                  additionalProperties: false
        '400':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                        message:
                          type: string
                      required:
                        - field
                        - message
                      additionalProperties: false
                required:
                  - code
                  - message
                additionalProperties: false
        '503':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  errors:
