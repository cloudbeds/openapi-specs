  /tags/:
    get:
      summary: Returns a list of tags for an entity
      tags:
        - Tags
      parameters:
        - schema:
            type: string
            pattern: ^\d+$
          in: query
          name: entityId
          required: false
        - schema:
            type: string
            enum:
              - guest
              - reservation
          in: query
          name: entityType
          required: false
        - schema:
            type: string
          in: query
          name: filters
          required: false
          description: |-
            Filter format: `field:operator:value`, multiple filters separated by semicolons.

            Supported fields and operators:
            - `entityId:in:` - comma-separated list of numeric entity IDs (e.g., `123,456,789`)
            - `entityType:in:` - comma-separated list of entity types: `guest`, `reservation`

            Examples:
            - `entityId:in:100,101,102`
            - `entityType:in:guest,reservation`
            - `entityId:in:100,101;entityType:in:guest,reservation` (bulk query for multiple entities)

            Notes:
            - Bulk queries support up to 500 entities per request
            - For single entity queries, use `entityId` and `entityType` parameters instead
        - schema:
            type: string
          in: header
          name: x-property-id
          required: true
          description: Property ID(s) - comma-separated list
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
